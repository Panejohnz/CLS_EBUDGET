<div class="container-fluid mt-3">

    <div class="card shadow-sm">
        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered align-middle text-center">

                    <thead class="table-light text-center">

                        <tr>
                            <th rowspan="2">ลำดับ</th>
                            <th rowspan="2">กิจกรรม</th>
                            <th colspan="3">ไตรมาส 1</th>
                            <th colspan="3">ไตรมาส 2</th>
                            <th colspan="3">ไตรมาส 3</th>
                            <th colspan="3">ไตรมาส 4</th>
                            <th rowspan="2">ลบ</th>
                        </tr>

                        <tr>
                            <ng-container *ngFor="let i of [1,2,3,4]">
                                <th>เดือน</th>
                                <th>แผนงาน</th>
                                <th>แผนเงิน</th>
                            </ng-container>
                        </tr>

                    </thead>

                    <tbody>

                        <ng-container *ngFor="let act of activities; let i = index">

                            <ng-container *ngFor="let rowIndex of [0,1,2]">

                                <tr>

                                    <td *ngIf="rowIndex === 0" rowspan="3">
                                        {{ i + 1 }}
                                    </td>
                                    <td *ngIf="rowIndex === 0" rowspan="3" class="text-start">
                                        <input class="form-control form-control-sm" [(ngModel)]="act.name">


                                    </td>

                                    <ng-container *ngFor="let q of act.quarters">

                                        <td>
                                            {{ q.months[rowIndex].month }}
                                        </td>

                                        <td>
                                            <div class="form-check d-flex justify-content-center">
                                                <input type="checkbox" class="form-check-input"
                                                    [(ngModel)]="q.months[rowIndex].selected">
                                            </div>
                                        </td>

                                        <td>
                                            <input type="number" class="form-control form-control-sm"
                                                [(ngModel)]="q.months[rowIndex].budget">
                                        </td>

                                    </ng-container>

                                    <td *ngIf="rowIndex === 0" rowspan="3">
                                        <button class="btn btn-sm btn-danger" (click)="removeActivity(i)">
                                            🗑
                                        </button>
                                    </td>

                                </tr>

                            </ng-container>
                            <tr>
                                <td colspan="15" class="bg-light">
                                    <div class="d-flex justify-content-between align-items-center">

                                        <div>
                                            <button class="btn btn-sm btn-primary me-2" (click)="addSub(act)">
                                                <i class="bi bi-plus-circle"></i> + เพิ่มกิจกรรมย่อย
                                            </button>

                                            <button class="btn btn-sm btn-outline-secondary"
                                                (click)="openMultiplierModal(fullDataModal)">
                                                <i class="bi bi-calculator"></i> แบบฟอร์มตัวคูณ
                                            </button>
                                        </div>

                                    </div>
                                </td>
                            </tr>
                            <ng-container *ngFor="let sub of act.subActivities; let subIndex = index">

                                <ng-container *ngFor="let rowIndex of [0,1,2]">

                                    <tr class="table-info">
                                        <td *ngIf="rowIndex === 0" rowspan="3"></td>

                                        <td *ngIf="rowIndex === 0" rowspan="3" class="text-start ps-5">
                                            <input class="form-control form-control-sm" [(ngModel)]="sub.name">
                                        </td>

                                        <ng-container *ngFor="let q of sub.quarters">

                                            <td>
                                                {{ q.months[rowIndex].month }}
                                            </td>

                                            <td>
                                                <div class="form-check d-flex justify-content-center">
                                                    <input type="checkbox" class="form-check-input"
                                                        [(ngModel)]="q.months[rowIndex].selected">
                                                </div>
                                            </td>

                                            <td>
                                                <input type="number" class="form-control form-control-sm"
                                                    [(ngModel)]="q.months[rowIndex].budget">
                                            </td>

                                        </ng-container>

                                        <td *ngIf="rowIndex === 0" rowspan="3">
                                            <button class="btn btn-sm btn-danger" (click)="removeSub(act, subIndex)">
                                                🗑
                                            </button>
                                        </td>

                                    </tr>

                                </ng-container>

                            </ng-container>
                        </ng-container>

                    </tbody>

                </table>

            </div>

            <button class="btn btn-success mt-3" (click)="addActivity()">
                + เพิ่มกิจกรรมหลัก
            </button>

        </div>
    </div>

</div>


<ng-template #fullDataModal let-modal>
    <div class="modal-header">
        <h5 class="modal-title">แบบฟอร์มตัวคูณ</h5>
        <button type="button" class="btn-close" (click)="modal.dismiss('Close click')"></button>
    </div>

    <app-training-seminar *ngIf="type === 'seminar'" [model]="project_planing">
    </app-training-seminar>
    <app-public-relations *ngIf="type === 'pr'" [model]="project_planing">
    </app-public-relations>
    <app-investment-budget *ngIf="type === 'investment'" [model]="project_planing">
    </app-investment-budget>
    <app-consultant-hire *ngIf="type === 'consult'" [model]="project_planing">
    </app-consultant-hire>
    <app-other-expense-project *ngIf="type === 'other'" [model]="project_planing">
    </app-other-expense-project>
</ng-template>
