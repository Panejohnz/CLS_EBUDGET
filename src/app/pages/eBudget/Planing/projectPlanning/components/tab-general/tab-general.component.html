<div class="row g-3">

    <div class="col-md-6">
        <label class="form-label">หน่วยงาน</label>
        <select class="form-select">
            <option value="">-- เลือกหน่วยงาน --</option>
        </select>
    </div>

    <div class="col-md-6">
        <label class="form-label">ประเภทโครงการ</label>
        <select class="form-select">
            <option value="">-- เลือกประเภทโครงการ --</option>
        </select>
    </div>

    <div class="col-md-6">
        <label class="form-label">แผนงาน</label>
        <select class="form-select"></select>
    </div>

    <div class="col-md-6">
        <label class="form-label">ผลผลิต</label>
        <select class="form-select"></select>
    </div>

    <div class="col-md-6">
        <label class="form-label">กิจกรรม</label>
        <select class="form-select"></select>
    </div>

    <div class="col-md-6">
        <label class="form-label">หมวดงบ</label>
        <select class="form-select"></select>
    </div>

    <div class="col-md-12">
        <label class="form-label">ชื่อโครงการ</label>
        <input type="text" class="form-control">
    </div>

</div>

<!-- ลักษณะโครงการ -->
<div class="mt-4">
    <label class="form-label d-block">ลักษณะโครงการ</label>

    <div class="form-check form-check-inline">
        <input type="radio" class="form-check-input" id="natureBudget" name="projectNature" value="budget" [(ngModel)]="project_planing">
        <label class="form-check-label" for="natureBudget">
            ใช้งบ
        </label>
    </div>

    <div class="form-check form-check-inline">
        <input type="radio" class="form-check-input" id="natureNonBudget" name="projectNature" value="nonbudget" [(ngModel)]="project_planing">
        <label class="form-check-label" for="natureNonBudget">
            ไม่ใช้งบ
        </label>
    </div>

    <div class="form-check form-check-inline">
        <input type="radio" class="form-check-input" id="natureNew" name="projectNature" value="new" [(ngModel)]="project_planing">
        <label class="form-check-label" for="natureNew">
            โครงการใหม่
        </label>
    </div>

    <div class="form-check form-check-inline">
        <input type="radio" class="form-check-input" id="natureContinue" name="projectNature" value="continue"
            [(ngModel)]="project_planing">
        <label class="form-check-label" for="natureContinue">
            โครงการต่อเนื่อง
        </label>
    </div>
</div>

<!-- การดำเนินการ -->
<div class="mt-3">
    <label class="form-label d-block">การดำเนินการ</label>

    <div class="form-check form-check-inline">
        <input type="radio" class="form-check-input" id="operateSelf" name="operationType" value="self">
        <label class="form-check-label" for="operateSelf">
            ดำเนินการเอง
        </label>
    </div>

    <div class="form-check form-check-inline">
        <input type="radio" class="form-check-input" id="operateHire" name="operationType" value="hire">
        <label class="form-check-label" for="operateHire">
            จัดจ้าง
        </label>
    </div>
</div>

<!-- Continue Project Only -->
@if (project_planing === 'continue' ) {<div class="row mt-3">

    <div class="col-md-6">
        <label class="form-label">จำนวนปีที่ดำเนินการ</label>
        <input type="number" class="form-control">
    </div>

    <div class="col-md-6">
        <label class="form-label">ปีนี้เป็นปีที่</label>
        <input type="number" class="form-control">
    </div>

</div>
}
