<div class="row">
    <div class="col-lg-12">
        <div class="card">
            <div class="card-header">
                <h4 class="card-title mb-0 flex-grow-1">วางแผนโครงการ</h4>
            </div>

            <div class="card-body">
                <br />
                <div class="row">
                    <div class="col-lg-4">
                        <div class="search-box d-inline-block mb-2">
                            <input type="text" class="form-control search" placeholder="ค้นหาโครงการ..."
                                [(ngModel)]="service.searchTerm" (input)="filterSearch()">
                            <i class="ri-search-line search-icon"></i>
                        </div>
                    </div>

                    <div class="col-lg-4">


                    </div>

                    <div class="col-lg-4 text-end">
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModalgrid"
                            (click)="fullModal(fullDataModal,emptyplan)">
                            <i class="ri-add-line me-1"></i>เพิ่มโครงการ
                        </button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-gridjs">
                        <thead>
                            <tr style="text-align: center;">
                                <th style="width:5%">ลำดับ</th>
                                <th style="width:10%">ปีงบ</th>

                                <th style="width:15%">รหัส</th>
                                <th style="width:20%">ชื่อย่อ</th>
                                <th style="width:35%">ชื่อโครงการ</th>
                                <!-- <th style="width:10%">สถานะ</th> -->
                                <th style="width:5%">แก้ไข</th>
                                <th style="width:5%">ลบ</th>
                            </tr>
                        </thead>

                        <tbody>
                            @for(data of griddata; track $index){
                            <tr>
                                <td class="text-center">{{$index + 1}}</td>
                                <td class="text-center">{{data.BgYear}}</td>
                                <td class="text-center">
                                    <ngb-highlight [result]="data.Plan_Code"
                                        [term]="service.searchTerm">{{data.Plan_Code}}</ngb-highlight>
                                </td>

                                <td>
                                    <ngb-highlight [result]="data.Plan_Short_Name"
                                        [term]="service.searchTerm">{{data.Plan_Short_Name}}</ngb-highlight>
                                </td>

                                <td>
                                    <ngb-highlight [result]="data.Plan_Name"
                                        [term]="service.searchTerm">{{data.Plan_Name}}</ngb-highlight>
                                </td>

                                <!-- <td class="text-center">
                                    <span class="badge"
                                        [ngClass]="isActive(data.Active) ? 'bg-success' : 'bg-secondary'">
                                        {{ isActive(data.Active) ? 'ใช้งาน' : 'ปิดใช้งาน' }}
                                    </span>
                                </td> -->

                                <td class="text-center">
                                    <button class="btn btn-warning btn-sm" data-bs-toggle="modal"
                                        data-bs-target="#exampleModalgrid" (click)="fullModal(fullDataModal,data)">
                                        <i class="ri-pencil-line"></i>
                                    </button>
                                </td>

                                <td class="text-center">
                                    <button class="btn btn-danger btn-sm" (click)="deletePlan(data)">
                                        <i class="ri-delete-bin-line"></i>
                                    </button>
                                </td>
                            </tr>
                            }
                        </tbody>
                    </table>
                </div>
                <div class="row justify-content-md-between align-items-md-center">
                    <div class="col-sm-12 col-md-5">
                        <div class="dataTables_info mb-2" id="tickets-table_info" role="status" aria-live="polite">
                            Showing
                            {{service.startIndex}} to
                            {{service.endIndex}} of {{service.totalRecords}}
                            entries
                        </div>
                    </div>
                    <div class="col-sm-12 col-md-5">
                        <div class="text-md-right float-md-end gridjs-pagination">
                            <ngb-pagination [collectionSize]="(total$ | async)!" [(page)]="service.page"
                                [pageSize]="service.pageSize">
                            </ngb-pagination>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<ng-template #fullDataModal let-modal>
    <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title">ข้อมูลโครงการ</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
                (click)="modal.dismiss('Close click')"></button>
        </div>
        <div class="modal-body">
            <div class="row">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header">
                            <!-- <h5 class="card-title mb-0">จัดการสิทธิ์ผู้ใช้งาน</h5> -->
                        </div>
                        <div class="row g-3">

                            <div class="col-md-3">
                                <label class="form-label">ปีงบประมาณ</label>
                                <select class="form-select" >
                                    <!-- <option *ngFor="let y of yearList" [value]="y">{{y}}</option> -->
                                </select>
                            </div>


                            <div class="col-md-6">
                                <label class="form-label">รหัสโครงการ</label>
                                <!-- <input type="text" class="form-control" [(ngModel)]="Mas_Planes.Plan_Code"> -->
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">ชื่อย่อ</label>
                                <!-- <input type="text" class="form-control"
                                    [(ngModel)]="Mas_Planes.Plan_Short_Name"> -->
                            </div>


                            <div class="col-12">
                                <label class="form-label">ชื่อโครงการ</label>
                                <!-- <textarea rows="3" class="form-control"
                                    [(ngModel)]="Mas_Planes.Plan_Name"></textarea> -->
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-primary" (click)="savePlan()">บันทึก</button>
        </div>
    </div>
</ng-template>
