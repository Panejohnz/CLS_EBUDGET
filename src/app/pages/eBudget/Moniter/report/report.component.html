<div class="card border-0 shadow-sm p-4 bg-light">

    <!-- 🔷 TITLE -->
    <h5 class="fw-bold mb-4">รายงานผลกรณีโครงการ จะมีรายงานเพิ่มเติม</h5>

    <!-- 🔷 OUTPUT -->
    <div class="mb-3">
        <label class="fw-semibold">เป้าหมายผลผลิต (Output)</label>
        <textarea class="form-control" rows="2" [(ngModel)]="output"></textarea>
    </div>

    <!-- 🔷 OUTCOME -->
    <div class="mb-4">
        <label class="fw-semibold">เป้าหมายผลลัพธ์ (Outcome)</label>
        <textarea  class="form-control" rows="2" [(ngModel)]="outcome"></textarea>
    </div>

    <!-- 🔷 PROGRESS -->
    <div class="card p-3 mb-3 border-0 shadow-sm">

        <label class="fw-semibold mb-1">
            ร้อยละความก้าวหน้าในการดำเนินการเมื่อเทียบกับแผน
        </label>

        <input type="number" class="form-control mb-2" [(ngModel)]="progress">

        <small class="text-muted">
            (เป็นตัวเลข)
        </small>

    </div>

    <!-- 🔷 PROBLEM -->
    <div class="card p-3 mb-3 border-0 shadow-sm">
        <label class="fw-semibold">ปัญหาและอุปสรรคในการดำเนินงาน</label>
        <textarea class="form-control" [(ngModel)]="problem"></textarea>
    </div>

    <!-- 🔷 SOLUTION -->
    <div class="card p-3 mb-3 border-0 shadow-sm">
        <label class="fw-semibold">แนวทางแก้ไขที่ดำเนินการไปแล้ว</label>
        <textarea class="form-control" [(ngModel)]="solution"></textarea>
    </div>

    <!-- 🔷 SUMMARY -->
    <div class="card p-3 mb-3 border-0 shadow-sm">
        <label class="fw-semibold">สรุปผลการดำเนินงาน</label>
        <textarea class="form-control" [(ngModel)]="summary"></textarea>
    </div>

    <!-- 🔷 SUGGEST -->
    <div class="card p-3 mb-3 border-0 shadow-sm">
        <label class="fw-semibold">ข้อเสนอแนะเพื่อการพัฒนา</label>
        <textarea class="form-control" [(ngModel)]="suggest"></textarea>
    </div>

    <!-- 🔷 FILE -->
    <div class="card p-3 border-0 shadow-sm">
        <label class="fw-semibold">ไฟล์แนบ (ถ้ามี)</label>
        <input type="file" class="form-control">
    </div>

</div>
