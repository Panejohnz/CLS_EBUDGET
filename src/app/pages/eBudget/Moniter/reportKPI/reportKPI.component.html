<div class="card p-3 bg-light">

    <h5 class="fw-bold mb-3">
        รายงานผลตามตัวชี้วัดแผนงาน
    </h5>

    <!-- TABLE -->
    <table class="table table-bordered text-center align-middle">

        <thead class="table-light">

            <tr>

                <th style="width:5%">
                    ลำดับ
                </th>

                <th style="width:10%">
                    ปีงบประมาณ
                </th>

                <th>
                    ชื่อตัวชี้วัด
                </th>

                <th style="width:15%">
                    รายงานผล
                </th>

            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let item of kpis; let i = index">

                <td>

                    {{i+1}}

                </td>

                <td>

                    {{item.BgYear}}

                </td>

                <td class="text-start">

                    {{item.Indicators_Name}}

                </td>

                <td>

                    <button class="btn btn-primary btn-sm" (click)="openForm(reportModal,item)">

                        <i class="ri-file-edit-line me-1"></i>

                        รายงานผล

                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>

<!-- ================================================= -->
<!-- MODAL -->
<!-- ================================================= -->
<ng-template #reportModal let-modal>

    <!-- HEADER -->
    <div class="modal-header border-0 pb-0">

        <div>

            <h4 class="modal-title fw-bold mb-1">

                รายงานผลตัวชี้วัด

            </h4>

            <small class="text-muted">

                บันทึกผลการดำเนินงานตามไตรมาส

            </small>

        </div>

        <button class="btn-close" (click)="modal.dismiss()">

        </button>

    </div>

    <!-- BODY -->
    <div class="modal-body pt-3">

        <div *ngIf="selectedKpi">

            <!-- KPI CARD -->
            <div class="card border-0 shadow-sm mb-4 bg-light">

                <div class="card-body">

                    <div class="d-flex align-items-start gap-3">

                        <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center"
                            style="width:50px;height:50px;">

                            <i class="ri-bar-chart-box-line text-primary fs-4"></i>

                        </div>

                        <div>

                            <div class="text-muted small mb-1">

                                ตัวชี้วัด

                            </div>

                            <div class="fw-bold fs-6">

                                {{selectedKpi.Indicators_Name}}

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!-- QUARTER -->
            <div class="card border-0 shadow-sm mb-4">

                <div class="card-body">

                    <div class="row align-items-center">

                        <div class="col-md-3">

                            <label class="fw-semibold mb-2 mb-md-0">

                                ไตรมาส

                            </label>

                        </div>

                        <div class="col-md-9">

                            <ng-select [items]="Tri_lists" bindLabel="name" bindValue="Trimas_Id"
                                [(ngModel)]="selectedTri" (change)="onChangeQuarter()" appendTo="body"
                                [clearable]="true" [searchable]="false" placeholder="-- เลือกไตรมาส --">

                            </ng-select>

                        </div>

                    </div>

                </div>

            </div>

            <!-- FORM -->
            <div class="card border-0 shadow-sm">

                <div class="card-body">

                    <!-- PROGRESS -->
                    <div class="mb-4">

                        <label class="fw-semibold mb-2">

                            ความก้าวหน้า

                        </label>

                        <input class="form-control" placeholder="กรอกความก้าวหน้า" [(ngModel)]="form.Progress">

                    </div>

                    <!-- RESULT -->
                    <div class="mb-4">

                        <label class="fw-semibold mb-2">

                            ผลการดำเนินงานตามตัวชี้วัด

                        </label>

                        <textarea rows="4" class="form-control" placeholder="กรอกผลการดำเนินงาน"
                            [(ngModel)]="form.Indicators_Result">

                        </textarea>

                    </div>

                    <!-- PROBLEM -->
                    <div class="mb-4">

                        <label class="fw-semibold mb-2">

                            ปัญหา / อุปสรรค

                        </label>

                        <textarea rows="4" class="form-control" placeholder="กรอกปัญหา / อุปสรรค"
                            [(ngModel)]="form.Problems">

                        </textarea>

                    </div>

                    <!-- SUGGESTION -->
                    <div>

                        <label class="fw-semibold mb-2">

                            ข้อเสนอแนะ

                        </label>

                        <textarea rows="4" class="form-control" placeholder="กรอกข้อเสนอแนะ"
                            [(ngModel)]="form.Suggestions">

                        </textarea>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- FOOTER -->
    <div class="modal-footer border-0 pt-0">

        <button class="btn btn-light px-4" (click)="modal.dismiss()">

            ปิด

        </button>

        <button class="btn btn-primary px-4" (click)="save(); modal.close()">

            <i class="ri-save-line me-1"></i>

            บันทึก

        </button>

    </div>

</ng-template>
