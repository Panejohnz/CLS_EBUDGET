<div class="card p-3 bg-light">

    <h5 class="fw-bold mb-3">
        รายงานผลตามตัวชี้วัดแผนงาน
    </h5>

    <!-- TABLE -->
    <table class="table table-bordered text-center align-middle">

        <thead class="table-light">

            <tr>

                <th style="width:5%">
                    ลำดับ
                </th>

                <th style="width:10%">
                    ปีงบประมาณ
                </th>

                <th>
                    ชื่อตัวชี้วัด
                </th>

                <th style="width:15%">
                    รายงานผล
                </th>

            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let item of kpis; let i = index">

                <td>

                    {{i+1}}

                </td>

                <td>

                    {{item.BgYear}}

                </td>

                <td class="text-start">

                    {{item.Indicators_Name}}

                </td>

                <td>

                    <button class="btn btn-primary btn-sm" (click)="openForm(reportModal,item)">

                        <i class="ri-file-edit-line me-1"></i>

                        รายงานผล

                    </button>

                </td>

            </tr>

        </tbody>

    </table>

</div>

<!-- ================================================= -->
<!-- MODAL -->
<!-- ================================================= -->

<ng-template #reportModal let-modal>

    <div class="modal-header bg-light">

        <h5 class="modal-title">

            รายงานผลตัวชี้วัด

        </h5>

        <button class="btn-close" (click)="modal.dismiss()">

        </button>

    </div>

    <div class="modal-body">

        <div *ngIf="selectedKpi">

            <!-- KPI INFO -->
            <div class="alert alert-light border mb-4">

                <div class="fw-bold mb-1">

                    ตัวชี้วัด

                </div>

                <div>

                    {{selectedKpi.Indicators_Name}}

                </div>

            </div>

            <!-- QUARTER -->
            <div class="row mb-3 align-items-center">

                <div class="col-md-3 fw-semibold">

                    ไตรมาส

                </div>

                <div class="col-md-9">

                    <ng-select [items]="Tri_lists" bindLabel="name" bindValue="Trimas_Id" [(ngModel)]="selectedTri"
                        (change)="onChangeQuarter()" appendTo="body" [clearable]="true" [searchable]="false"
                        placeholder="-- เลือกไตรมาส --">

                    </ng-select>
                </div>

            </div>

            <!-- PROGRESS -->
            <div class="row mb-3 align-items-center">

                <div class="col-md-3 fw-semibold">

                    ความก้าวหน้า

                </div>

                <div class="col-md-9">

                    <input class="form-control" [(ngModel)]="form.Progress">

                </div>

            </div>

            <!-- RESULT -->
            <div class="row mb-3">

                <div class="col-md-3 fw-semibold">

                    ผลการดำเนินงานตามตัวชี้วัด

                </div>

                <div class="col-md-9">

                    <textarea rows="4" class="form-control" [(ngModel)]="form.Indicators_Result">

                    </textarea>

                </div>

            </div>

            <!-- PROBLEM -->
            <div class="row mb-3">

                <div class="col-md-3 fw-semibold">

                    ปัญหา / อุปสรรค

                </div>

                <div class="col-md-9">

                    <textarea rows="4" class="form-control" [(ngModel)]="form.Problems">

                    </textarea>

                </div>

            </div>

            <!-- SUGGEST -->
            <div class="row mb-3">

                <div class="col-md-3 fw-semibold">

                    ข้อเสนอแนะ

                </div>

                <div class="col-md-9">

                    <textarea rows="4" class="form-control" [(ngModel)]="form.Suggestions">

                    </textarea>

                </div>

            </div>

        </div>

    </div>

    <!-- FOOTER -->
    <div class="modal-footer">

        <button class="btn btn-primary" (click)="save(); modal.close()">

            <i class="ri-save-line me-1"></i>

            บันทึก

        </button>

        <button class="btn btn-secondary" (click)="modal.dismiss()">

            ปิด

        </button>

    </div>

</ng-template>
