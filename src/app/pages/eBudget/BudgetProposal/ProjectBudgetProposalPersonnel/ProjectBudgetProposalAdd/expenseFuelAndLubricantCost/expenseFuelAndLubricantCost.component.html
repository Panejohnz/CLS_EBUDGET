<div class="card shadow-sm">



    <div class="card-body bg-light">

        <div class="table-responsive">
            <table class="table table-bordered align-middle text-center bg-white mb-0">

                <thead class="table-secondary">
                    <tr>
                        <th width="5%">ลำดับ</th>
                        <th width="55%">ประเภท</th>
                        <th colspan="2" width="30%">ราคา</th>
                        <th width="5%"></th>
                    </tr>
                    <tr>
                        <th></th>
                        <th></th>
                        <th width="15%">รวม/เดือน</th>
                        <th width="15%">ต่อปี</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody>

                    <tr *ngFor="let item of items; let i = index">
                        <td>{{i+1}}</td>

                        <td>
                            <ng-select [items]="vehicleOptions" bindLabel="name" [(ngModel)]="item.vehicle"
                                placeholder="--- ประเภท ---" appendTo="body" (ngModelChange)="calculate(i)">
                            </ng-select>
                        </td>

                        <!-- รวม/เดือน -->
                        <td>
                            <input type="number" class="form-control form-control-sm text-end"
                                [(ngModel)]="item.monthly" (ngModelChange)="calculate(i)">
                        </td>

                        <!-- ต่อปี -->
                        <td class="text-end fw-bold">
                            {{item.yearly | number:'1.2-2'}}
                        </td>

                        <!-- ลบ -->
                        <td>
                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">
                                🗑
                            </button>
                        </td>
                    </tr>

                </tbody>

                <!-- รวม -->
                <tfoot class="table-secondary">
                    <tr>
                        <td colspan="2" class="text-end fw-bold">
                            รวม
                        </td>

                        <td class="text-end fw-bold">
                            {{totalMonthly | number:'1.2-2'}}
                        </td>

                        <td class="text-end fw-bold">
                            {{grandTotal | number:'1.2-2'}}
                        </td>

                        <td></td>
                    </tr>
                </tfoot>

            </table>
        </div>

        <!-- ปุ่ม -->
        <div class="mt-3 d-flex justify-content-between align-items-center">
            <div>
                <button class="btn btn-primary btn-sm" (click)="addItem()">
                    + เพิ่มรายการ
                </button>

                <span class="ms-2 text-danger">
                    จำนวน {{items.length}} รายการ
                </span>
            </div>
        </div>

    </div>


</div>
