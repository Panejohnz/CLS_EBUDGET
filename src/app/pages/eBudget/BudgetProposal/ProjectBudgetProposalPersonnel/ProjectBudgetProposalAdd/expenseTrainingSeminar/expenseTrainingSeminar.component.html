<div class="container-fluid p-3">

    <!-- HEADER -->
    <div class="card shadow-sm border-0 mb-3">

        <div class="card-header bg-light fw-semibold">
            แบบฟอร์มค่าใช้จ่ายในการสัมมนาและฝึกอบรม
        </div>

        <div class="card-body">

            <div class="row g-3">

                <!-- โครงการ -->
                <div class="col-md-5">

                    <label class="form-label fw-semibold">
                        โครงการ/หลักสูตร
                    </label>

                    <textarea class="form-control" rows="3" placeholder="ระบุโครงการ/หลักสูตร"
                        [(ngModel)]="projectName">
          </textarea>

                </div>


                <!-- สถานที่ -->
                <div class="col-md-1">

                    <label class="form-label fw-semibold">
                        สถานที่จัดกิจกรรม
                    </label>

                    <div class="form-check">

                        <input class="form-check-input" type="checkbox" [(ngModel)]="locationOffice" id="government">

                        <label class="form-check-label" for="government">
                            ราชการ
                        </label>

                    </div>

                    <div class="form-check">

                        <input class="form-check-input" type="checkbox" [(ngModel)]="locationHotel" id="private">

                        <label class="form-check-label" for="private">
                            เอกชน
                        </label>

                    </div>

                </div>


                <!-- คำชี้แจง -->
                <div class="col-md-4">

                    <label class="form-label fw-semibold">
                        คำชี้แจง
                    </label>

                    <textarea class="form-control" rows="3" [(ngModel)]="description" placeholder="ระบุคำชี้แจง">
          </textarea>

                </div>
                <div class="col-md-2">

                    <label class="form-label fw-semibold">
                        แนบไฟล์
                    </label>

                    <input type="file" class="form-control" (change)="onFileChange($event)" required>


                </div>
            </div>

        </div>

    </div>


    <!-- EXPENSE TABLE -->

    <div class="card shadow-sm border-0">

        <div class="card-header bg-light fw-semibold">
            ค่าใช้จ่าย
        </div>

        <div class="card-body p-0">

            <div class="table-responsive">

                <table class="table table-bordered text-center align-middle mb-0">

                    <thead class="table-light">

                        <tr>

                            <th style="width:250px">
                                รายการค่าใช้จ่าย
                            </th>

                            <th style="width:100px">
                                ครั้ง/รุ่น
                            </th>

                            <th colspan="4">
                                จำนวนคน
                            </th>

                            <th colspan="2">
                                ระบุจำนวน/หน่วย
                            </th>

                            <th colspan="2">
                                อัตราค่าใช้จ่ายที่ตั้ง
                            </th>

                            <th style="width:150px">
                                รวมเงิน (บาท)
                            </th>

                            <th style="width:50px"></th>

                        </tr>

                        <tr>

                            <th></th>

                            <th></th>

                            <th>ประเภท ก</th>
                            <th>ประเภท ข</th>
                            <th>บุคคลภายนอก</th>

                            <th>คน</th>
                            <th>จำนวน</th>
                            <th>หน่วยนับ</th>
                            <th>อัตราค่าใช่จ่าย</th>
                            <th>หน่วยนับ</th>

                            <th></th>
                            <th></th>

                        </tr>

                    </thead>


                    <tbody>

                        <tr *ngFor="let item of expenseList; let i=index">

                            <!-- รายการ -->
                            <td class="text-start">

                                <select class="form-select" [(ngModel)]="item.expenseType">

                                    <option value="">
                                        --- ค่าใช้จ่าย ---
                                    </option>

                                    <option value="speaker">
                                        ค่าตอบแทนวิทยากร
                                    </option>

                                    <option value="food">
                                        ค่าอาหารและเครื่องดื่ม
                                    </option>

                                    <option value="hotel">
                                        ค่าเช่าที่พัก
                                    </option>

                                    <option value="transport">
                                        ค่าพาหนะ
                                    </option>

                                </select>

                            </td>


                            <!-- ครั้ง -->
                            <td>

                                <input type="number" class="form-control text-center" [(ngModel)]="item.times"
                                    (ngModelChange)="calculate(item)">

                            </td>


                            <!-- ประเภท ก -->
                            <td>

                                <input type="number" class="form-control" [(ngModel)]="item.typeA"
                                    (ngModelChange)="calculate(item)">

                            </td>


                            <!-- ประเภท ข -->
                            <td>

                                <input type="number" class="form-control" [(ngModel)]="item.typeB"
                                    (ngModelChange)="calculate(item)">

                            </td>


                            <!-- ภายนอก -->
                            <td>

                                <input type="number" class="form-control" [(ngModel)]="item.external"
                                    (ngModelChange)="calculate(item)">

                            </td>


                            <!-- คน -->
                            <td>

                                <input type="number" class="form-control" [(ngModel)]="item.person"
                                    (ngModelChange)="calculate(item)">

                            </td>


                            <!-- จำนวน -->
                            <td>

                                <input type="number" class="form-control" [(ngModel)]="item.qty"
                                    (ngModelChange)="calculate(item)">

                            </td>


                            <!-- rate -->
                            <td>

                                <select class="form-select" [(ngModel)]="item.unit">

                                    <option>บาท</option>
                                    <option>คน</option>
                                    <option>วัน</option>

                                </select>
                            </td>
                            <td>

                                <input type="number" class="form-control" [(ngModel)]="item.rate"
                                    (ngModelChange)="calculate(item)">

                            </td>

                            <!-- unit -->
                            <td>

                                <select class="form-select" [(ngModel)]="item.unit2">

                                    <option>บาท</option>
                                    <option>คน</option>
                                    <option>วัน</option>

                                </select>

                            </td>


                            <!-- total -->
                            <td class="fw-semibold text-end">

                                {{item.total | number:'1.2-2'}}

                            </td>


                            <!-- delete -->
                            <td>

                                <button class="btn btn-sm btn-outline-danger" (click)="removeRow(i)">

                                    🗑

                                </button>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>


        <!-- FOOTER -->

        <div class="card-footer d-flex justify-content-between">

            <button class="btn btn-outline-primary btn-sm" (click)="addRow()">

                + เพิ่มรายการ

            </button>

            <!-- <div>

                <button class="btn btn-primary me-2">
                    บันทึก
                </button>

                <button class="btn btn-light">
                    ✖ ปิดหน้าต่าง
                </button>

            </div> -->

        </div>

    </div>

</div>
