<div class="card shadow-sm">

  <div class="card-header bg-light d-flex justify-content-between align-items-center">

    <span class="fw-bold">
      แบบฟอร์มค่าจ้างเหมาบริการเครื่องถ่ายเอกสาร
    </span>

    <button class="btn btn-primary btn-sm" (click)="addItem()">
      + เพิ่มรายการ
    </button>

  </div>


  <div class="card-body bg-light">

    <div class="table-responsive">

      <table class="table table-bordered align-middle text-center bg-white">

        <thead class="table-light">

          <tr>
            <th style="width:5%">ลำดับ</th>
            <th style="width:25%">รายการ</th>
            <th style="width:12%">ราคา</th>
            <th style="width:12%">จำนวนเครื่อง</th>
            <th style="width:12%">จำนวนเดือน</th>
            <th style="width:12%">รวม</th>
            <th style="width:18%">แนบเอกสาร</th>
            <th style="width:4%"></th>
          </tr>

        </thead>


        <tbody>

          <tr *ngFor="let item of items; let i = index">

            <td>{{i+1}}</td>

            <!-- รายการ -->
            <td class="text-start">

              <select class="form-select form-select-sm mb-1" [(ngModel)]="item.type">

                <option value="">--- รายการ ---</option>
                <option value="5000">ปริมาณขั้นต่ำ 5,000 แผ่น</option>
                <option value="10000">ปริมาณขั้นต่ำ 10,000 แผ่น</option>
                <option value="other">อื่นๆ (ระบุ)</option>

              </select>

              <input *ngIf="item.type=='other'" type="text" class="form-control form-control-sm"
                [(ngModel)]="item.otherDetail" placeholder="ระบุรายละเอียด">

            </td>


            <!-- ราคา -->
            <td>
              <input type="number" class="form-control form-control-sm text-end" [(ngModel)]="item.price"
                (input)="calculate(i)">
            </td>


            <!-- จำนวนเครื่อง -->
            <td>
              <input type="number" class="form-control form-control-sm text-end" [(ngModel)]="item.qty"
                (input)="calculate(i)">
            </td>


            <!-- เดือน -->
            <td>
              <input type="number" class="form-control form-control-sm text-end" [(ngModel)]="item.month"
                (input)="calculate(i)">
            </td>


            <!-- รวม -->
            <td class="fw-bold text-end">
              {{item.total | number:'1.2-2'}}
            </td>


            <!-- แนบเอกสาร -->
            <td>

              <input type="file" class="form-control form-control-sm" (change)="onFileSelected($event,i)">

            </td>


            <!-- ลบ -->
            <td>

              <button class="btn btn-danger btn-sm" (click)="removeItem(i)">
                🗑
              </button>

            </td>

          </tr>

        </tbody>


        <tfoot class="table-light fw-bold">

          <tr>

            <td colspan="5" class="text-end">
              รวมทั้งสิ้น
            </td>

            <td class="text-end">
              {{grandTotal | number:'1.2-2'}}
            </td>

            <td colspan="2"></td>

          </tr>

        </tfoot>

      </table>

    </div>

  </div>

</div>
