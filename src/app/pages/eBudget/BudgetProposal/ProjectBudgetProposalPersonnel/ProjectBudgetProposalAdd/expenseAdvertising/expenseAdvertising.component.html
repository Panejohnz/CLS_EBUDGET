<div class="card shadow-sm">

    <div class="card-body bg-light">

        <div class="table-responsive">
            <table class="table table-bordered align-middle text-center bg-white mb-0">

                <tbody>

                    <ng-container *ngFor="let group of groups; let gi = index">

                        <!-- ===== หัวใหญ่ ===== -->
                        <tr>
                            <td width="5%">{{gi+1}}</td>

                            <td colspan="6" class="text-start">
                                <input class="form-control form-control-sm mb-2" [(ngModel)]="group.name"
                                    placeholder="ระบุรายการ">

                                <textarea class="form-control form-control-sm mb-2" [(ngModel)]="group.objective"
                                    placeholder="วัตถุประสงค์"></textarea>

                                <textarea class="form-control form-control-sm" [(ngModel)]="group.result"
                                    placeholder="ผลที่คาดว่าจะได้รับ"></textarea>
                            </td>

                            <td class="text-end fw-bold align-top">
                                {{group.total | number:'1.2-2'}}
                            </td>

                            <td class="align-top">
                                <button class="btn btn-danger btn-sm" (click)="removeGroup(gi)">
                                    🗑
                                </button>
                            </td>
                        </tr>

                        <!-- ===== header รายการย่อย ===== -->
                        <tr class="table-secondary">
                            <td></td>
                            <td>รายการย่อย</td>
                            <td>จำนวน/ระยะเวลา</td>
                            <td>จำนวน/บาท</td>
                            <td>จำนวน/ครั้ง</td>
                            <td>อัตราที่ใช้</td>
                            <td>รวม</td>
                            <td></td>
                            <td></td>
                        </tr>

                        <!-- ===== รายการย่อยของ group นี้ ===== -->
                        <tr *ngFor="let item of group.items; let i = index">

                            <td></td>

                            <td>
                                <input class="form-control form-control-sm" [(ngModel)]="item.name">
                            </td>

                            <td>
                                <input type="number" class="form-control form-control-sm text-end"
                                    [(ngModel)]="item.duration" (input)="calculate(gi,i)">
                            </td>

                            <td>
                                <input type="number" class="form-control form-control-sm text-end"
                                    [(ngModel)]="item.amount" (input)="calculate(gi,i)">
                            </td>

                            <td>
                                <input type="number" class="form-control form-control-sm text-end"
                                    [(ngModel)]="item.times" (input)="calculate(gi,i)">
                            </td>

                            <td>
                                <input type="number" class="form-control form-control-sm text-end"
                                    [(ngModel)]="item.rate" (input)="calculate(gi,i)">
                            </td>

                            <td class="text-end fw-bold">
                                {{item.total | number:'1.2-2'}}
                            </td>

                            <td>
                                <button class="btn btn-danger btn-sm" (click)="removeItem(gi,i)">
                                    🗑
                                </button>
                            </td>

                            <td></td>
                        </tr>

                        <!-- ===== ปุ่มเพิ่มย่อย (ของ group นี้เท่านั้น) ===== -->
                        <tr>
                            <td></td>
                            <td colspan="7" class="text-start">
                                <button class="btn btn-primary btn-sm" (click)="addItem(gi)">
                                    + เพิ่มรายการย่อย
                                </button>
                            </td>
                            <td></td>
                        </tr>
                        <hr class="my-12">
                    </ng-container>

                </tbody>

                <!-- รวมทั้งหมด -->
                <tfoot>
                    <tr class="table-secondary">
                        <td colspan="7" class="text-end fw-bold">
                            รวมทั้งสิ้น
                        </td>
                        <td class="text-end fw-bold">
                            {{grandTotal | number:'1.2-2'}}
                        </td>
                        <td></td>
                    </tr>
                </tfoot>

            </table>
        </div>

        <!-- ปุ่มเพิ่มรายการหลัก -->
        <div class="mt-3">
            <button class="btn btn-primary btn-sm" (click)="addGroup()">
                + เพิ่มรายการ
            </button>

            <span class="ms-2 text-danger">
                จำนวน {{groups.length}} รายการ
            </span>
        </div>

    </div>

    <!-- Footer -->
    <!-- <div class="card-footer text-end">
        <button class="btn btn-success" (click)="save()">
            💾 บันทึก
        </button>
        <button class="btn btn-light" (click)="closeModal()">
            ✖ ปิดหน้าต่าง
        </button>
    </div> -->

</div>
