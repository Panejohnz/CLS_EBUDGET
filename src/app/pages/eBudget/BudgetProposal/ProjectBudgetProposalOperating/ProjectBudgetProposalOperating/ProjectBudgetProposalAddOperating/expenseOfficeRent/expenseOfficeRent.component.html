<div class="container-fluid bg-light p-3">

  <div class="card shadow-sm border-0">

    <!-- <div class="card-header bg-light  fw-semibold">
      แบบฟอร์มค่าเช่าทรัพย์สิน
    </div> -->

    <div class="card-body p-0">

      <div class="table-responsive">

        <table class="table table-bordered align-middle text-center">

          <thead class="table-secondary">

            <tr>

              <th>รายการทรัพย์สิน</th>

              <th>ขนาดพื้นที่ (ตรม.)</th>

              <th>ค่าเช่า/ตรม. (บาท)</th>

              <th>ค่าเช่า/เดือน</th>

              <th>ค่าเช่า/ปี</th>

              <th>วัตถุประสงค์</th>

              <th>แนบเอกสาร</th>

              <th></th>

            </tr>

          </thead>

          <tbody>

            <tr *ngFor="let item of rentList; let i=index">

              <td>

                <input class="form-control" [(ngModel)]="item.asset">

              </td>


              <td>

                <input type="number" class="form-control text-end" [(ngModel)]="item.area"
                  (ngModelChange)="calculate(item)">

              </td>


              <td>

                <input type="number" class="form-control text-end" [(ngModel)]="item.pricePerSqm"
                  (ngModelChange)="calculate(item)">

              </td>


              <td>

                <input type="number" class="form-control text-end" [(ngModel)]="item.monthlyRent"
                  (ngModelChange)="calculateYear(item)">

              </td>


              <td>

                <input type="number" class="form-control text-end" [(ngModel)]="item.yearlyRent"
                  (ngModelChange)="calculateGrand()">

              </td>


              <td>

                <input class="form-control" [(ngModel)]="item.purpose">

              </td>


              <td>

                <input type="file" class="form-control form-control-sm">

              </td>


              <td>

                <button class="btn btn-sm btn-outline-danger" (click)="removeRow(i)">
                  🗑
                </button>

              </td>

            </tr>

          </tbody>


          <tfoot class="table-secondary fw-semibold">

            <tr>

              <td class="text-end">
                รวม
              </td>

              <td class="text-end">
                {{totalArea | number:'1.2-2'}}
              </td>

              <td class="text-end">
                {{totalRate | number:'1.2-2'}}
              </td>

              <td class="text-end">
                {{totalMonth | number:'1.2-2'}}
              </td>

              <td class="text-end">
                {{totalYear | number:'1.2-2'}}
              </td>

              <td colspan="3"></td>

            </tr>

          </tfoot>

        </table>

      </div>

    </div>

  </div>


  <div class="d-flex justify-content-between mt-3">

    <button class="btn btn-outline-primary btn-sm" (click)="addRow()">
      + เพิ่มรายการ
    </button>

    <div>

      <button class="btn btn-primary me-2">
        บันทึก
      </button>

      <button class="btn btn-danger">
        ปิดหน้าต่าง
      </button>

    </div>

  </div>

</div>
