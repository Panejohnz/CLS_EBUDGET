<div class="container-fluid bg-light p-3">

  <!-- Header -->


  <!-- Card -->
  <div class="card shadow-sm">
    <div class="card-body p-0">

      <div class="table-responsive">
        <table class="table table-bordered mb-0 align-middle text-center">

          <!-- Header -->
          <thead class="table-secondary">
            <tr>
              <th style="width:5%">ลำดับ</th>
              <th style="width:45%">รายการ</th>
              <th colspan="3">จำนวน</th>
              <th style="width:5%"></th>
            </tr>
            <tr>
              <th></th>
              <th></th>
              <th style="width:10%">คัน</th>
              <th style="width:15%">ค่าซ่อม/คัน</th>
              <th style="width:15%">รวม</th>
              <th></th>
            </tr>
          </thead>

          <!-- Body -->
          <tbody>
            <tr *ngFor="let item of items; let i = index">

              <td>{{ i + 1 }}</td>

              <!-- รายการ -->
              <td>
                <select class="form-select">
                  <option>--- รายการ ---</option>
                  <option>รถที่มีอายุการใช้งาน 4-6 ปี หรือ 60,000-120,000 กิโลเมตร</option>
                  <option>รถที่มีอายุการใช้งาน 6 ปี หรือ 120,000 กิโลเมตร</option>
                </select>
              </td>

              <!-- คัน -->
              <td>
                <input type="number" class="form-control text-end" [(ngModel)]="item.quantity">
              </td>

              <!-- ราคาต่อคัน -->
              <td>
                <input type="number" class="form-control text-end" [(ngModel)]="item.price">
              </td>

              <!-- รวม -->
              <td class="text-end fw-bold">
                {{ getTotal(item) | number:'1.2-2' }}
              </td>

              <!-- ลบ -->
              <td>
                <button class="btn btn-outline-danger btn-sm" (click)="removeItem(i)">
                  🗑
                </button>
              </td>

            </tr>
          </tbody>
        </table>
      </div>

      <!-- Footer -->
      <div class="d-flex justify-content-between align-items-center p-3 border-top">

        <div>
          <button class="btn btn-primary btn-sm" (click)="addItem()">
            + เพิ่มรายการ
          </button>
          <span class="ms-3 text-danger">
            จำนวน {{ items.length }} รายการ
          </span>
        </div>

        <div class="text-end">
          <div class="fw-bold">
            รวมทั้งหมด:
            <span class="text-success">
              {{ getGrandTotal() | number:'1.2-2' }} บาท
            </span>
          </div>

          <div class="mt-2">
            <button class="btn btn-primary btn-sm me-2">
              💾 บันทึก
            </button>
            <button class="btn btn-danger btn-sm">
              ✖ ปิดหน้าต่าง
            </button>
          </div>
        </div>

      </div>

    </div>
  </div>
</div>
