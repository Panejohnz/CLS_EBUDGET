<div class="card bg-light border-0">

    <div class="card-header bg-light  fw-bold">
        แบบฟอร์มค่าเบี้ยประชุมคณะกรรมการ
    </div>


    <div class="card-body">

        <div *ngFor="let item of committeeList; let i=index" class="border rounded bg-white mb-3">

            <div class="p-2 bg-light fw-bold d-flex justify-content-between">

                <span>รายการ {{i+1}}</span>

                <button class="btn btn-sm btn-outline-danger" (click)="removeRow(i)">
                    <i class="bx bx-trash"></i>
                </button>

            </div>


            <div class="p-2">

                <label class="form-label fw-bold">
                    รายชื่อคณะกรรมการ / คณะอนุกรรมการ
                </label>

                <input class="form-control mb-3" [(ngModel)]="item.committeeName" placeholder="ระบุ คณะกรรมการ">

                <table class="table table-bordered align-middle text-center bg-white">

                    <thead class="table-light">

                        <tr>

                            <th class="text-start">ตำแหน่ง</th>
                            <th style="width:120px">จำนวนคน</th>
                            <th style="width:120px">จำนวนวัน/ครั้ง</th>
                            <th style="width:150px">ค่าตอบแทน (บาท)</th>
                            <th style="width:150px">รวม (บาท)</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr *ngFor="let role of item.roles">

                            <td class="text-start fw-semibold">
                                {{role.name}}
                            </td>

                            <td>
                                <input type="number" class="form-control text-center" [(ngModel)]="role.qty"
                                    (ngModelChange)="calculate(i)">
                            </td>

                            <td>
                                <input type="number" class="form-control text-center" [(ngModel)]="role.day"
                                    (ngModelChange)="calculate(i)">
                            </td>

                            <td>
                                <input type="number" class="form-control text-end" [(ngModel)]="role.rate"
                                    (ngModelChange)="calculate(i)">
                            </td>

                            <td class="text-end fw-semibold bg-light">
                                {{role.total | number:'1.2-2'}}
                            </td>

                        </tr>

                    </tbody>

                    <tfoot class="table-light fw-bold">

                        <tr>

                            <td colspan="4" class="text-end">
                                รวม
                            </td>

                            <td class="text-end">
                                {{item.total | number:'1.2-2'}}
                            </td>

                        </tr>

                    </tfoot>

                </table>

            </div>

        </div>


        <div class="mb-2">

            <button class="btn btn-primary btn-sm" (click)="addRow()">

                <i class="bx bx-plus"></i>
                เพิ่มรายการ

            </button>

            <span class="text-danger ms-2">
                จำนวน {{committeeList.length}} รายการ รวมทั้งสิ้น {{grandTotal | number:'1.2-2'}} บาท
            </span>

        </div>

    </div>

        <button class="btn btn-success" (click)="save()">
            💾 บันทึก
        </button>
        <button class="btn btn-danger" (click)="closeModal()">
            ✖ ปิดหน้าต่าง
        </button>

    </div> -->

</div>
