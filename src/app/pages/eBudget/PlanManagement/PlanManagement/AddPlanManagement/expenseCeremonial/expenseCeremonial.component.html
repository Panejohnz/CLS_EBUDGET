<div class="card shadow-sm">

    <div class="card-body bg-light">

        <!-- รายการหลัก -->
        <div class="mb-2 d-flex justify-content-between align-items-center">
            <div class="fw-semibold">
                1
                <input class="form-control form-control-sm d-inline-block ms-2" style="width:400px" [(ngModel)]="title"
                    placeholder="ระบุรายการประชุม หรือรายละเอียดอื่น ๆ">
            </div>

            <div class="text-danger">
                จำนวน 1 รายการ
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered align-middle text-center bg-white mb-0">

                <!-- header -->
                <thead class="table-secondary">
                    <tr>
                        <th rowspan="2" width="40%">รายการ</th>
                        <th colspan="3">รายการรับรอง</th>
                        <th rowspan="2" width="15%">รวม</th>
                        <th rowspan="2" width="5%"></th>
                    </tr>
                    <tr>
                        <th width="15%">จำนวนมื้อ</th>
                        <th width="15%">จำนวนคน</th>
                        <th width="15%">ราคา</th>
                    </tr>
                </thead>

                <tbody>

                    <!-- ค่าอาหารกลางวัน -->
                    <tr>
                        <td class="text-start">
                            ค่าอาหารกลางวัน
                        </td>

                        <td>
                            <input type="number" class="form-control form-control-sm text-end" [(ngModel)]="lunch.meal"
                                (input)="calculate()">
                        </td>

                        <td>
                            <input type="number" class="form-control form-control-sm text-end"
                                [(ngModel)]="lunch.person" (input)="calculate()">
                        </td>

                        <td>
                            <input type="number" class="form-control form-control-sm text-end" [(ngModel)]="lunch.price"
                                (input)="calculate()">
                        </td>

                        <td class="text-end fw-bold">
                            {{lunch.total | number:'1.2-2'}}
                        </td>

                        <td></td>
                    </tr>

                    <!-- ค่าอาหารว่าง -->
                    <tr>
                        <td class="text-start">
                            ค่าอาหารว่างและเครื่องดื่ม
                        </td>

                        <td>
                            <input type="number" class="form-control form-control-sm text-end" [(ngModel)]="snack.meal"
                                (input)="calculate()">
                        </td>

                        <td>
                            <input type="number" class="form-control form-control-sm text-end"
                                [(ngModel)]="snack.person" (input)="calculate()">
                        </td>

                        <td>
                            <input type="number" class="form-control form-control-sm text-end" [(ngModel)]="snack.price"
                                (input)="calculate()">
                        </td>

                        <td class="text-end fw-bold">
                            {{snack.total | number:'1.2-2'}}
                        </td>

                        <td></td>
                    </tr>

                </tbody>

                <!-- รวม -->
                <tfoot class="table-secondary">
                    <tr>
                        <td class="text-end fw-bold">
                            รวม
                        </td>

                        <td class="fw-bold">
                            {{totalMeal}}
                        </td>

                        <td class="fw-bold">
                            {{totalPerson}}
                        </td>

                        <td></td>

                        <td class="text-end fw-bold">
                            {{grandTotal | number:'1.2-2'}}
                        </td>

                        <td></td>
                    </tr>
                </tfoot>

            </table>
        </div>

        <!-- ปุ่ม -->
        <div class="mt-3">
            <button class="btn btn-primary btn-sm">
                + เพิ่มรายการ
            </button>
        </div>

    </div>

    <!-- Footer -->
    <!-- <div class="card-footer text-end">
        <button class="btn btn-success" (click)="save()">
            💾 บันทึก
        </button>
        <button class="btn btn-light" (click)="closeModal()">
            ✖ ปิดหน้าต่าง
        </button>
    </div> -->

</div>
