<div class="card shadow-sm">
  <div class="card-header">
    <h5 class="mb-0">ความสอดคล้องโครงการ</h5>
  </div>

  <div class="card-body">
    <p class="text-muted mb-4">เลือกประเภทความสอดคล้องที่ต้องการจัดการข้อมูล</p>

    <div class="row g-3">
      <div class="col-md-6" *ngFor="let item of menuItems">
        <div class="plan-menu-item" (click)="goToSubPage(item.path)">
          <div class="plan-menu-num">{{ item.no }}</div>
          <div class="plan-menu-icon">
            <i [class]="item.icon"></i>
          </div>
          <div class="plan-menu-text">{{ item.title }}</div>
          <i class="ri-arrow-right-s-line plan-menu-arrow"></i>
        </div>
      </div>
    </div>
  </div>
</div>
