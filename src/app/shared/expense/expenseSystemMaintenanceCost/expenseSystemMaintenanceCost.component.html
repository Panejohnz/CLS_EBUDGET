<div class="card shadow-sm">

    <div class="card-body bg-light">

        <div class="table-responsive">

            <table class="table table-bordered align-middle text-center bg-white mb-0">

                <!-- HEADER -->
                <thead class="table-secondary">

                    <tr>

                        <th width="5%">

                            ลำดับ

                        </th>

                        <th width="35%">

                            รายการ

                        </th>

                        <th width="15%">

                            จำนวน (บาท)

                        </th>

                        <th width="10%">

                            จำนวน

                        </th>

                        <th width="10%">

                            หน่วยนับ

                        </th>

                        <th width="10%">

                            จำนวนเดือน

                        </th>

                        <th width="5%">

                            รวมทั้งสิ้น

                        </th>

                        <th width="10%">

                            แนบไฟล์

                        </th>

                        <th width="5%"></th>

                    </tr>

                </thead>

                <!-- BODY -->
                <tbody>

                    <tr *ngFor="let item of items; let i = index">

                        <!-- index -->
                        <td>

                            {{ i + 1 }}

                        </td>

                        <!-- name -->
                        <td>

                            <input class="form-control form-control-sm" [(ngModel)]="item.name"
                                (ngModelChange)="updateDetailItems()">

                        </td>

                        <!-- price -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="item.price"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- qty -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="item.qty"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- unit -->
                        <td>

                            <select class="form-select form-select-sm" [(ngModel)]="item.unit"
                                (ngModelChange)="updateDetailItems()">

                                <option>

                                    คน

                                </option>

                                <option>

                                    งาน

                                </option>

                                <option>

                                    ครั้ง

                                </option>

                                <option>

                                    ระบบ

                                </option>

                            </select>

                        </td>

                        <!-- month -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="item.month"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- total -->
                        <td class="text-end fw-bold text-primary">

                            {{
                            item.total
                            | number:'1.2-2'
                            }}

                        </td>

                        <!-- file -->
                        <td>

                            <input type="file" class="form-control form-control-sm" (change)="uploadFile($event, i)">

                            <small class="text-success d-block mt-1" *ngIf="item.fileName">

                                📎 {{ item.fileName }}

                            </small>

                        </td>

                        <!-- remove -->
                        <td>

                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">

                                🗑

                            </button>

                        </td>

                    </tr>

                </tbody>

                <!-- FOOTER -->
                <tfoot class="table-secondary">

                    <tr>

                        <td colspan="3" class="text-end fw-bold">

                            รวมทั้งสิ้น

                        </td>

                        <td class="fw-bold">

                            {{ totalQty | number:'1.0-2' }}

                        </td>

                        <td></td>

                        <td class="fw-bold">

                            {{ totalMonth | number:'1.0-2' }}

                        </td>

                        <td class="text-end fw-bold text-primary">

                            {{
                            grandTotal
                            | number:'1.2-2'
                            }}

                        </td>

                        <td colspan="2"></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <!-- ACTION -->
        <div class="mt-3 d-flex justify-content-between align-items-center">

            <div>

                <button class="btn btn-primary btn-sm" (click)="addItem()">

                    + เพิ่มรายการ

                </button>

                <span class="ms-2 text-danger">

                    จำนวน {{ items.length }} รายการ

                </span>

            </div>

        </div>

    </div>

</div>
