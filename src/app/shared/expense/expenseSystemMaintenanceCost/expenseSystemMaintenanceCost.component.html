<div class="expense-table-responsive">

    <table class="table table-bordered align-middle expense-table text-center mb-0">

        <!-- header -->
        <thead class="text-center text-white expense-table-header">

            <tr>

                <th width="5%">

                    ลำดับ

                </th>

                <th width="35%">

                    รายการ

                </th>

                <th width="10%">

                    จำนวน

                </th>

                <th width="10%">

                    หน่วยนับ

                </th>

                <th width="10%">

                    จำนวนเดือน

                </th>
                                <th width="15%">

                    อัตราค่าใช้จ่าย (บาท)

                </th>

                <th width="5%">

                    รวมทั้งสิ้น

                </th>

                <th width="5%">ลบ</th>

            </tr>

        </thead>

        <!-- BODY -->
        <tbody>

            <tr *ngFor="let item of items; let i = index">

                <!-- index -->
                <td>

                    {{ i + 1 }}

                </td>

                <!-- name -->
                <td>

                    <input class="form-control " [(ngModel)]="item.name" placeholder="ระบุรายการ"
                        (ngModelChange)="updateDetailItems()">

                </td>

                <!-- qty -->
                <td>

                    <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal"
                        class="form-control  text-center" [(ngModel)]="item.qty" placeholder="ระบุจำนวน"
                        (ngModelChange)="calculate(i)">

                </td>

                <!-- unit -->
                <td>

                    <select class="form-select" [(ngModel)]="item.unit"
                        (ngModelChange)="updateDetailItems()">

                        <option>

                            คน

                        </option>

                        <option>

                            งาน

                        </option>

                        <option>

                            ครั้ง

                        </option>

                        <option>

                            ระบบ

                        </option>

                    </select>

                </td>

                <!-- month -->
                <td>

                    <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal"
                        class="form-control  text-end" [(ngModel)]="item.month" placeholder="ระบุจำนวนเดือน" 
                        (ngModelChange)="calculate(i)">

                </td>
                
                <!-- price -->
                <td>

                    <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal"
                        class="form-control  text-end" [(ngModel)]="item.price" placeholder="ระบุราคา/หน่วย" 
                        (ngModelChange)="calculate(i)">

                </td>


                <!-- total -->
                <td class="text-end fw-bold text-black">

                    {{
                    item.total
                    | number:'1.2-2'
                    }}

                </td>

                <!-- remove -->
                <td>

                    <button class="btn btn-danger btn-sm" (click)="removeItem(i)">

                                      <i class="bx bx-trash"></i>

                    </button>

                </td>

            </tr>

        </tbody>

        <!-- FOOTER -->
        <tfoot>

            <tr>

                <td colspan="3" class="text-end fw-bold">

                    รวมทั้งสิ้น

                </td>

                <td class="fw-bold">

                    {{ totalQty | number:'1.0-2' }}

                </td>

                <td></td>

                <td class="fw-bold">

                    {{ totalMonth | number:'1.0-2' }}

                </td>

                <td class="text-end fw-bold text-white">

                    {{
                    grandTotal
                    | number:'1.2-2'
                    }}

                </td>

                <td colspan="2"></td>

            </tr>

        </tfoot>

    </table>

</div>

<!-- ACTION -->
<div class="mt-3 d-flex justify-content-between align-items-center">

    <div>

        <button class="btn btn-primary" (click)="addItem()">

               <i class="bx bx-plus text-black"></i>
                   <span class="text-black"> เพิ่มรายการ</span>

        </button>

        <span class="ms-2 text-danger">

            จำนวน {{ items.length }} รายการ

        </span>

    </div>

</div>
