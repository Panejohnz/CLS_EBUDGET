
      <div class="expense-table-responsive">

        <table class="table table-bordered align-middle expense-table text-center mb-0">

          <thead class="text-center text-white expense-table-header">

                    <tr>

                        <th width="5%">
                            ลำดับ
                        </th>

                        <th width="30%">
                            รายการ
                        </th>

                        <th width="10%">
                            จำนวน
                        </th>

                        <th width="10%">
                            หน่วยนับ
                        </th>

                        <th width="10%">
                            จำนวนเดือน
                        </th>
                        <th width="12%">
                            อัตรา (บาท)
                        </th>
                        <th width="10%">
                            รวมทั้งสิ้น
                        </th>

                        <th width="3%">ลบ</th>

                    </tr>

                </thead>

                <!-- body -->
                <tbody>

                    <tr *ngFor="let item of items; let i=index">

                        <!-- no -->
                        <td>

                            {{ i + 1 }}

                        </td>

                        <!-- name -->
                        <td>

                            <input class="form-control" [(ngModel)]="item.name"
                                (ngModelChange)="updateDetailItems()" placeholder="ระบุรายการ">

                        </td>


                        <!-- qty -->
                        <td>

                            <!-- <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-center" [(ngModel)]="item.qty"
                                (ngModelChange)="calculate(i)"> -->
                            <input type="text" class="form-control text-center"   placeholder="ระบุจำนวน"
                                [value]="displayInputNumber(item.qty)"
                                (input)="formatInput($event, item, 'qty'); calculate(i)" inputmode="decimal">


                        </td>

                        <!-- unit -->
                        <td>

                            <!-- <select class="form-select form-select-sm" [(ngModel)]="item.unit"
                                (change)="updateDetailItems()">

                                <option>คน</option>

                                <option>งาน</option>

                                <option>ครั้ง</option>

                                <option>ชุด</option>

                                <option>เครื่อง</option>

                            </select> -->
                            <ng-select appendTo="body" dropdownPosition="auto" (change)="updateDetailItems()"
                                [items]="Mas_Unit_Lists" bindLabel="Unit_Name" bindValue="Unit_Id"
                                [(ngModel)]="item.Unit" name="output_unit_{{i}}"
                                placeholder="-- เลือกหน่วยนับ --" [clearable]="false">
                            </ng-select>
                        </td>

                        <!-- month -->
                        <td>

                            <!-- <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-center" [(ngModel)]="item.month"
                                (ngModelChange)="calculate(i)"> -->
                            <input type="text" class="form-control text-center"
                                [value]="displayInputNumber(item.month)" placeholder="ระบุจำนวนเดือน"
                                (input)="formatInput($event, item, 'month'); calculate(i)" inputmode="decimal">

                        </td>

                        <!-- price -->
                        <td>

                            <!-- <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="item.price"
                                (ngModelChange)="calculate(i)"> -->
                            <input type="text" class="form-control text-end pe-3" placeholder="ระบุอัตรา (บาท)"
                                [value]="displayInputNumber(item.price)"
                                (input)="formatInput($event, item, 'price'); calculate(i)" inputmode="decimal">

                        </td>


                        <!-- total -->
                        <td class="text-end fw-bold">

                            {{
                            item.total
                            }}

                        </td>

                        <!-- delete -->
                        <td>

                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">

                               <i class="bx bx-trash"></i>

                            </button>

                        </td>

                    </tr>

                </tbody>

                <!-- footer -->
                <tfoot class="table fw-bold expense-table-header">

                    <tr>

                        <td colspan="6" class="text-end">

                            รวมทั้งสิ้น

                        </td>

                        <td class="text-end fw-bold">

                            {{
                            grandTotal
                            | number:'1.2-2'
                            }}

                        </td>

                        <td colspan="2"></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <!-- footer action -->
        <div class="mt-3 d-flex justify-content-between align-items-center">

            <button class="btn btn-primary" (click)="addItem()">

              <i class="bx bx-plus text-black"></i>
                   <span class="text-black"> เพิ่มรายการ</span>

            </button>

            <span class="text-danger">

                จำนวน {{ items.length }} รายการ

            </span>

        </div>
