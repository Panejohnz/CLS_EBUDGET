<div class="card shadow-sm">

    <!-- body -->
    <div class="card-body bg-light">

        <div class="table-responsive">

            <table class="table table-bordered align-middle text-center bg-white mb-0">

                <!-- header -->
                <thead class="table-secondary">

                    <tr>

                        <th width="5%">
                            ลำดับ
                        </th>

                        <th width="30%">
                            รายการ
                        </th>

                        <th width="12%">
                            จำนวน (บาท)
                        </th>

                        <th width="10%">
                            จำนวน
                        </th>

                        <th width="10%">
                            หน่วยนับ
                        </th>

                        <th width="10%">
                            จำนวนเดือน
                        </th>

                        <th width="10%">
                            รวมทั้งสิ้น
                        </th>

                        <th width="10%">
                            แนบไฟล์
                        </th>

                        <th width="3%"></th>

                    </tr>

                </thead>

                <!-- body -->
                <tbody>

                    <tr *ngFor="let item of items; let i=index">

                        <!-- no -->
                        <td>

                            {{ i + 1 }}

                        </td>

                        <!-- name -->
                        <td>

                            <input class="form-control form-control-sm" [(ngModel)]="item.name"
                                (ngModelChange)="updateDetailItems()" placeholder="ระบุรายการ">

                        </td>

                        <!-- price -->
                        <td>

                            <input type="number" class="form-control form-control-sm text-end" [(ngModel)]="item.price"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- qty -->
                        <td>

                            <input type="number" class="form-control form-control-sm text-end" [(ngModel)]="item.qty"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- unit -->
                        <td>

                            <select class="form-select form-select-sm" [(ngModel)]="item.unit"
                                (change)="updateDetailItems()">

                                <option>คน</option>

                                <option>งาน</option>

                                <option>ครั้ง</option>

                                <option>ชุด</option>

                                <option>เครื่อง</option>

                            </select>

                        </td>

                        <!-- month -->
                        <td>

                            <input type="number" class="form-control form-control-sm text-end" [(ngModel)]="item.month"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- total -->
                        <td class="text-end fw-bold text-primary">

                            {{
                            item.total
                            | number:'1.2-2'
                            }}

                        </td>

                        <!-- file -->
                        <td>

                            <input type="file" class="form-control form-control-sm" (change)="uploadFile($event,i)">

                        </td>

                        <!-- delete -->
                        <td>

                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">

                                🗑

                            </button>

                        </td>

                    </tr>

                </tbody>

                <!-- footer -->
                <tfoot class="table-light fw-bold">

                    <tr>

                        <td colspan="6" class="text-end">

                            รวม

                        </td>

                        <td class="text-end text-primary">

                            {{
                            grandTotal
                            | number:'1.2-2'
                            }}

                        </td>

                        <td colspan="2"></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <!-- footer action -->
        <div class="mt-3 d-flex justify-content-between align-items-center">

            <button class="btn btn-primary btn-sm" (click)="addItem()">

                + เพิ่มรายการ

            </button>

            <span class="text-danger">

                จำนวน {{ items.length }} รายการ

            </span>

        </div>

    </div>

</div>
