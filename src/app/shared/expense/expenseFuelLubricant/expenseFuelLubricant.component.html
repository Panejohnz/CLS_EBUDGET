<div class="card shadow-sm">

    <div class="card-body bg-light">

        <div class="expense-table-responsive">

            <table class="table table-bordered align-middle expense-table text-center bg-white">

                <!-- HEADER -->
                <thead class="text-center text-white expense-table-header">

                    <tr>

                        <th style="width:5%">

                            ลำดับ

                        </th>

                        <th>

                            ประเภทยานพาหนะ

                        </th>

                        <th colspan="2">

                            ราคา

                        </th>

                        <th style="width:5%"></th>

                    </tr>

                    <tr>

                        <th></th>

                        <th></th>

                        <th style="width:15%">

                            รวม/เดือน

                        </th>

                        <th style="width:15%">

                            ต่อปี

                        </th>

                        <th></th>

                    </tr>

                </thead>

                <!-- BODY -->
                <tbody>

                    <tr *ngFor="let item of list; let i = index">

                        <!-- index -->
                        <td>

                            {{ i + 1 }}

                        </td>

                        <!-- dropdown -->
                        <td>

                            <select class="form-select" [(ngModel)]="item.type" (ngModelChange)="updateDetailItems()">

                                <option value="">

                                    --- ประเภทยานพาหนะ ---

                                </option>

                                <option *ngFor="let v of vehicleTypes" [value]="v">

                                    {{ v }}

                                </option>

                            </select>

                        </td>

                        <!-- monthly -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control text-end" [(ngModel)]="item.month"
                                (ngModelChange)="calculate(item)">

                        </td>

                        <!-- yearly -->
                        <td class="fw-bold text-end text-primary">

                            {{
                            item.year
                            | number:'1.2-2'
                            }}

                        </td>

                        <!-- delete -->
                        <td>

                            <button class="btn btn-outline-danger btn-sm" (click)="remove(i)">

                                🗑

                            </button>

                        </td>

                    </tr>

                </tbody>

                <!-- FOOTER -->
                <tfoot>

                    <tr class="fw-bold">

                        <td colspan="2" class="text-end">

                            รวม

                        </td>

                        <td class="text-end">

                            {{
                            getTotal('month')
                            | number:'1.2-2'
                            }}

                        </td>

                        <td class="text-end">

                            {{
                            getTotal('year')
                            | number:'1.2-2'
                            }}

                        </td>

                        <td></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <!-- ADD -->
        <button class="btn btn-primary mt-3" (click)="add()">

            + เพิ่มรายการ

        </button>

    </div>

</div>
