<div class="expense-table-responsive">

    <table class="table table-bordered align-middle expense-table text-center mb-0">

        <!-- header -->
        <thead class="text-center text-white expense-table-header">

            <tr>

                <th style="width:5%">

                    ลำดับ

                </th>

                <th>

                    ประเภทยานพาหนะ

                </th>
                <th style="width:15%">

                    ค่าใช้จ่าย/เดือน

                </th>

                <th style="width:15%">

                    ค่าใช้จ่าย/ปี

                </th>


                <th style="width:5%">ลบ</th>

            </tr>



        </thead>

        <!-- BODY -->
        <tbody>

            <tr *ngFor="let item of list; let i = index">

                <!-- index -->
                <td>

                    {{ i + 1 }}

                </td>

                <!-- dropdown -->
                <td>

                    <ng-select appendTo="body" dropdownPosition="auto" [items]="Mas_Expense_Detial_List"
                        bindLabel="Expense_Detial_Name" bindValue="Expense_Detial_Id" [(ngModel)]="item.pairId"
                        name="fuel_lubricant_detail_{{i}}" placeholder="-- เลือกรายการ --" [clearable]="false"
                        (change)="onTypeChange(item)">
                    </ng-select>

                    <input *ngIf="isOtherType(item)" type="text" class="form-control"
                        [class.is-invalid]="!item.otherType"
                        name="fuel_lubricant_other_{{i}}" [(ngModel)]="item.otherType"
                        (ngModelChange)="onOtherTypeChange()" placeholder="ระบุประเภทยานพาหนะ" required>

                    <div *ngIf="isOtherType(item) && !item.otherType" class="invalid-feedback d-block text-start">
                        กรุณาระบุประเภทยานพาหนะ
                    </div>

                </td>

                <!-- monthly -->
                <td  class="align-top">

                    <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" placeholder="ระบุค่าใช้จ่าย/เดือน"
                        class="form-control text-end" [class.bg-light]="!isOtherType(item)"
                        [(ngModel)]="item.month" [disabled]="!isOtherType(item)" (ngModelChange)="calculate(item)">

                </td>

                <!-- yearly -->
                <td class="fw-bold text-end text-black align-top">

                    {{
                    item.year
                    | number:'1.2-2'
                    }}

                </td>

                <!-- delete -->
                <td  class="align-top">

                    <button class="btn btn-danger btn-sm" (click)="remove(i)">

                        <i class="bx bx-trash"></i>

                    </button>

                </td>

            </tr>

        </tbody>

        <!-- FOOTER -->
        <tfoot>

            <tr class="fw-bold">

                <td colspan="2" class="text-end">

                    รวมทั้งสิ้น

                </td>

                <td class="text-end">

                    {{
                    getTotal('month')
                    | number:'1.2-2'
                    }}

                </td>

                <td class="text-end">

                    {{
                    getTotal('year')
                    | number:'1.2-2'
                    }}

                </td>

                <td></td>

            </tr>

        </tfoot>

    </table>

</div>
