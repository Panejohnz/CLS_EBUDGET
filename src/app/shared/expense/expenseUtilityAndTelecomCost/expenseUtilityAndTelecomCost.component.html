
  <div class="expense-table-responsive">

    <table class="table table-bordered align-middle expense-table text-center mb-0">

      <!-- header -->
      <thead class="text-center text-white expense-table-header">

                    <tr>

                        <th width="5%">

                            ลำดับ

                        </th>

                        <th width="40%">

                            รายการ

                        </th>

                        <th width="25%">

                            ค่าใช้จ่าย/ต่อเดือน (บาท)

                        </th>

                        <th width="25%">

                            ค่าใช้จ่าย/ต่อปี (บาท)

                        </th>

                        <th width="5%">ลบ</th>

                    </tr>

                </thead>

                <!-- BODY -->
                <tbody>

                    <tr *ngFor="let item of items; let i = index">

                        <!-- index -->
                        <td>

                            {{ i + 1 }}

                        </td>

                        <!-- name -->
                        <td>

                            <input type="text" class="form-control " [(ngModel)]="item.name"  placeholder="ระบุรายการ"
                                (ngModelChange)="updateDetailItems()">

                        </td>

                        <!-- monthly -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal"  placeholder="ระบุค่าใช้จ่าย/ต่อเดือน"
                            class="form-control text-end"
                                [(ngModel)]="item.monthly" (ngModelChange)="calculate(i)">

                        </td>

                        <!-- yearly -->
                        <td class="text-end fw-bold text-black">

                            {{
                            item.yearly
                            | number:'1.2-2'
                            }}

                        </td>

                        <!-- remove -->
                        <td>

                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">

                                 <i class="bx bx-trash"></i>

                            </button>

                        </td>

                    </tr>

                </tbody>

                <!-- FOOTER -->
                <tfoot>

                    <tr>

                        <td colspan="2" class="text-end fw-bold">

                            รวมทั้งสิ้น

                        </td>

                        <td class="text-end fw-bold">

                            {{
                            totalMonthly
                            | number:'1.2-2'
                            }}

                        </td>

                        <td class="text-end fw-bold text-white">

                            {{
                            grandTotal
                            | number:'1.2-2'
                            }}

                        </td>

                        <td></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <!-- ACTION -->
        <div class="mt-3 d-flex justify-content-between align-items-center">

            <div>

                <button class="btn btn-primary" (click)="addItem()">

                     <i class="bx bx-plus text-black"></i>
                   <span class="text-black"> เพิ่มรายการ</span>

                </button>

                <span class="ms-2 text-danger">

                    จำนวน {{ items.length }} รายการ

                </span>

            </div>

        </div>
