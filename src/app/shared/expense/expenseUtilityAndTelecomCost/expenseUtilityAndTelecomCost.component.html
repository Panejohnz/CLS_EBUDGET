<div class="card shadow-sm">

    <div class="card-body bg-light">

        <div class="table-responsive">

            <table class="table table-bordered align-middle text-center bg-white mb-0">

                <!-- HEADER -->
                <thead class="table-secondary">

                    <tr>

                        <th width="5%">

                            ลำดับ

                        </th>

                        <th width="40%">

                            รายการ

                        </th>

                        <th width="25%">

                            ต่อเดือน (บาท)

                        </th>

                        <th width="25%">

                            ต่อปี (บาท)

                        </th>

                        <th width="5%"></th>

                    </tr>

                </thead>

                <!-- BODY -->
                <tbody>

                    <tr *ngFor="let item of items; let i = index">

                        <!-- index -->
                        <td>

                            {{ i + 1 }}

                        </td>

                        <!-- name -->
                        <td>

                            <input type="text" class="form-control form-control-sm" [(ngModel)]="item.name"
                                (ngModelChange)="updateDetailItems()">

                        </td>

                        <!-- monthly -->
                        <td>

                            <input type="number" class="form-control form-control-sm text-end"
                                [(ngModel)]="item.monthly" (ngModelChange)="calculate(i)">

                        </td>

                        <!-- yearly -->
                        <td class="text-end fw-bold text-primary">

                            {{
                            item.yearly
                            | number:'1.2-2'
                            }}

                        </td>

                        <!-- remove -->
                        <td>

                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">

                                🗑

                            </button>

                        </td>

                    </tr>

                </tbody>

                <!-- FOOTER -->
                <tfoot class="table-secondary">

                    <tr>

                        <td colspan="2" class="text-end fw-bold">

                            รวม

                        </td>

                        <td class="text-end fw-bold">

                            {{
                            totalMonthly
                            | number:'1.2-2'
                            }}

                        </td>

                        <td class="text-end fw-bold text-primary">

                            {{
                            grandTotal
                            | number:'1.2-2'
                            }}

                        </td>

                        <td></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <!-- ACTION -->
        <div class="mt-3 d-flex justify-content-between align-items-center">

            <div>

                <button class="btn btn-primary btn-sm" (click)="addItem()">

                    + เพิ่มรายการ

                </button>

                <span class="ms-2 text-danger">

                    จำนวน {{ items.length }} รายการ

                </span>

            </div>

        </div>

    </div>

</div>
