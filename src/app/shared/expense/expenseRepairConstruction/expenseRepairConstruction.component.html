<div class="card shadow-sm">


    <div class="card-body bg-light">

        <div class="table-responsive">
            <table class="table table-bordered align-middle text-center bg-white">

                <thead class="table-secondary">
                    <tr>
                        <th width="5%">ลำดับ</th>
                        <th width="35%">รายการ</th>
                        <th width="15%">จำนวน</th>
                        <th width="20%">ราคา/หน่วย</th>
                        <th width="20%">รวม</th>
                        <th width="5%"></th>
                    </tr>
                </thead>

                <tbody>
                    <tr *ngFor="let item of items; let i = index">
                        <td>{{i+1}}</td>

                        <td>
                            <input class="form-control form-control-sm" [(ngModel)]="item.name">
                        </td>

                        <td>
                            <input type="number" class="form-control form-control-sm text-end" [(ngModel)]="item.qty"
                                (input)="calculate(i)">
                        </td>

                        <td>
                            <input type="number" class="form-control form-control-sm text-end" [(ngModel)]="item.price"
                                (input)="calculate(i)">
                        </td>

                        <td class="text-end fw-bold">
                            {{item.total | number:'1.2-2'}}
                        </td>

                        <td>
                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">
                                🗑
                            </button>
                        </td>
                    </tr>
                </tbody>

                <tfoot>
                    <tr class="table-secondary">
                        <td colspan="2" class="text-end fw-bold">
                            รวมทั้งสิ้น
                        </td>
                        <td class="fw-bold">
                            {{getTotalQty()}}
                        </td>
                        <td></td>
                        <td class="text-end fw-bold">
                            {{grandTotal | number:'1.2-2'}}
                        </td>
                        <td></td>
                    </tr>
                </tfoot>

            </table>
        </div>

        <!-- แนบไฟล์ -->
        <div class="mt-3">
            <label class="fw-semibold">
                แนบไฟล์ เอกสาร (pdf,xls,xlsx,doc,docx)
            </label>

            <input type="file" class="form-control form-control-sm mt-1" (change)="uploadFile($event)">
        </div>

        <!-- ปุ่ม -->
        <div class="mt-3 d-flex justify-content-between align-items-center">
            <div>
                <button class="btn btn-primary btn-sm" (click)="addItem()">
                    + เพิ่มรายการ
                </button>

                <span class="ms-2 text-danger">
                    จำนวน {{items.length}} รายการ
                </span>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <!-- <div class="card-footer text-end">
        <button class="btn btn-success" (click)="save()">
            💾 บันทึก
        </button>
        <button class="btn btn-light" (click)="closeModal()">
            ✖ ปิดหน้าต่าง
        </button>
    </div> -->
</div>
