<div class="card shadow-sm">

    <div class="card-header bg-light fw-bold">

        แบบฟอร์มค่าซ่อมแซมสิ่งก่อสร้าง

    </div>

    <div class="card-body bg-light">

        <div class="table-responsive">

            <table class="table table-bordered align-middle text-center bg-white mb-0">

                <!-- header -->
                <thead class="table-secondary">

                    <tr>

                        <th width="5%">
                            ลำดับ
                        </th>

                        <th width="35%">
                            รายการ
                        </th>

                        <th width="15%">
                            จำนวน
                        </th>

                        <th width="20%">
                            ราคา/หน่วย
                        </th>

                        <th width="20%">
                            รวม
                        </th>

                        <th width="5%"></th>

                    </tr>

                </thead>

                <!-- body -->
                <tbody>

                    <tr *ngFor="let item of items; let i=index">

                        <!-- no -->
                        <td>

                            {{ i + 1 }}

                        </td>

                        <!-- name -->
                        <td>

                            <input class="form-control form-control-sm" [(ngModel)]="item.name"
                                (ngModelChange)="updateDetailItems()" placeholder="ระบุรายการ">

                        </td>

                        <!-- qty -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="item.qty"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- price -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="item.price"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- total -->
                        <td class="text-end fw-bold text-primary">

                            {{
                            item.total
                            | number:'1.2-2'
                            }}

                        </td>

                        <!-- delete -->
                        <td>

                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">

                                🗑

                            </button>

                        </td>

                    </tr>

                </tbody>

                <!-- footer -->
                <tfoot>

                    <tr class="table-secondary fw-bold">

                        <td colspan="2" class="text-end">

                            รวมทั้งสิ้น

                        </td>

                        <!-- qty -->
                        <td>

                            {{ getTotalQty() | number:'1.0-2' }}

                        </td>

                        <td></td>

                        <!-- total -->
                        <td class="text-end text-primary">

                            {{
                            grandTotal
                            | number:'1.2-2'
                            }}

                        </td>

                        <td></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <!-- upload -->
        <div class="mt-3">

            <label class="fw-semibold">

                แนบไฟล์ เอกสาร
                (pdf,xls,xlsx,doc,docx)

            </label>

            <input type="file" class="form-control form-control-sm mt-1" (change)="uploadFile($event)">

        </div>

        <!-- footer action -->
        <div class="mt-3 d-flex justify-content-between align-items-center">

            <div>

                <button class="btn btn-primary btn-sm" (click)="addItem()">

                    + เพิ่มรายการ

                </button>

                <span class="ms-2 text-danger">

                    จำนวน {{ items.length }} รายการ

                </span>

            </div>

        </div>

    </div>

</div>
