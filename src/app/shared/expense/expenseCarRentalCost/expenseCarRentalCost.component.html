<div class="card shadow-sm">


    

    <div class="card-body bg-light">

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-3">
            <li class="nav-item">
                <button class="nav-link" [class.active]="tab==='old'" (click)="tab='old'; calculateAll()">
                    ผูกพันเดิม
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" [class.active]="tab==='new'" (click)="tab='new'; calculateAll()">
                    ผูกพันใหม่
                </button>
            </li>
        </ul>

        <!-- TABLE -->
        <div class="table-responsive">
            <table class="table table-bordered align-middle text-center bg-white">

                <thead class="table-secondary">
                    <tr>
                        <th>ลำดับ</th>
                        <th>ประเภทรถ</th>
                        <th>จำนวน/คัน</th>
                        <th>ค่าเช่าต่อเดือน</th>
                        <th>จำนวนเดือน</th>
                        <th>รวม (บาท)</th>
                        <th *ngIf="tab==='old'">แนบไฟล์</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody>
                    <tr *ngFor="let item of getCurrentItems(); let i=index">

                        <td>{{i+1}}</td>

                        <td>
                            <ng-select [items]="carOptions" bindLabel="name" [(ngModel)]="item.car" appendTo="body"
                                (ngModelChange)="onSelectCar(item,i)" placeholder="--- ประเภทรถ ---">
                            </ng-select>
                        </td>

                        <td>
                            <input type="number" class="form-control form-control-sm text-end" [(ngModel)]="item.qty"
                                (ngModelChange)="calculate(i)">
                        </td>

                        <td>
                            <input type="number" class="form-control form-control-sm text-end" [(ngModel)]="item.price"
                                (ngModelChange)="calculate(i)">
                        </td>

                        <td>
                            <input type="number" class="form-control form-control-sm text-end" [(ngModel)]="item.month"
                                (ngModelChange)="calculate(i)">
                        </td>

                        <td class="text-end fw-bold">
                            {{item.total | number:'1.2-2'}}
                        </td>

                        <!-- แนบไฟล์ -->
                        <td *ngIf="tab==='old'">
                            <input type="file" class="form-control form-control-sm" (change)="uploadFile($event,i)">
                            <small class="text-success d-block mt-1" *ngIf="item.fileName">
                                📎 {{item.fileName}}
                            </small>
                        </td>

                        <td>
                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">
                                🗑
                            </button>
                        </td>

                    </tr>
                </tbody>

                <tfoot class="table-secondary">
                    <tr>
                        <td colspan="4" class="text-end fw-bold">รวมทั้งสิ้น</td>
                        <td class="fw-bold">{{totalMonth}}</td>
                        <td class="text-end fw-bold">{{grandTotal | number:'1.2-2'}}</td>
                        <td *ngIf="tab==='old'"></td>
                        <td></td>
                    </tr>
                </tfoot>

            </table>
        </div>

        <!-- ปุ่ม -->
        <div class="mt-3">
            <button class="btn btn-primary btn-sm" (click)="addItem()">
                + เพิ่มรายการ
            </button>

            <span class="ms-2 text-danger">
                จำนวน {{getCurrentItems().length}} รายการ
            </span>
        </div>

    </div>

    <!-- <div class="card-footer text-end">
        <button class="btn btn-success" (click)="save()">💾 บันทึก</button>
        <button class="btn btn-danger">✖ ปิดหน้าต่าง</button>
    </div> -->

</div>
