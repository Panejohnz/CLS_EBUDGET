<div class="card shadow-sm">

    <div class="card-body bg-light">

        <!-- table -->
        <div class="expense-table-responsive">

            <table class="table table-bordered align-middle expense-table text-center bg-white asset-investment-table">

                <!-- header -->
                <thead class="text-center text-white expense-table-header">

                    <tr>

                        <th rowspan="2" style="width:5%">

                            ลำดับ

                        </th>

                        <th rowspan="2" class="item-col">

                            รายการ

                        </th>

                        <th colspan="2">

                            ราคาในมาตรฐาน

                        </th>

                        <th rowspan="2" style="width:12%">

                            ราคา/หน่วย

                        </th>

                        <th rowspan="2" style="width:10%">

                            จำนวน

                        </th>

                        <th rowspan="2" style="width:13%">

                            วงเงินรวม

                        </th>

                        <th colspan="2">

                            เหตุผล

                        </th>

                        <th rowspan="2"></th>

                    </tr>

                    <tr>

                        <th width="7%">

                            ใน

                        </th>

                        <th width="7%">

                            นอก

                        </th>

                        <th width="15%">

                            จำนวนที่ขอใหม่

                        </th>

                        <th width="15%">

                            จำนวนทดแทน

                        </th>

                    </tr>

                </thead>

                <!-- body -->
                <tbody>

                    <tr *ngFor="
                            let item of items;
                            let i = index
                        ">

                        <!-- index -->
                        <td>

                            {{ i + 1 }}

                        </td>

                        <!-- item -->
                        <td>

                            <input *ngIf="isTextMode" class="form-control form-control-sm"
                                [(ngModel)]="item.materialName" (ngModelChange)="updateDetailItems()">

                            <ng-select *ngIf="!isTextMode" class="asset-investment-select" [items]="Mas_Expense_Detial_List" bindLabel="Expense_Detial_Name"
                                bindValue="Expense_Detial_Id" [(ngModel)]="item.material"
                                placeholder="--- โปรดเลือก ---" appendTo="body"
                                (change)="onMaterialChange(item, $event, i)">
                            </ng-select>

                            <input *ngIf="!isTextMode && isOtherDetail(item)" class="form-control form-control-sm mt-1"
                                placeholder="ระบุรายการ" [(ngModel)]="item.customMaterialName"
                                (ngModelChange)="updateDetailItems()">

                        </td>

                        <!-- standard in -->
                        <td>

                            <input type="checkbox" [(ngModel)]="item.standardIn" (ngModelChange)="updateDetailItems()">

                        </td>

                        <!-- standard out -->
                        <td>

                            <input type="checkbox" [(ngModel)]="item.standardOut" (ngModelChange)="updateDetailItems()">

                        </td>

                        <!-- price -->
                        <td>

                            <input [readonly]="!isTextMode" type="text" mask="separator.2" thousandSeparator="," decimalMarker="."
                                inputmode="decimal" class="form-control form-control-sm text-end"
                                [(ngModel)]="item.price" (ngModelChange)="calculate(i)">

                        </td>

                        <!-- qty -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="."
                                inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="item.qty"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- total -->
                        <td class="text-end fw-bold text-primary">

                            {{
                            item.total
                            | number:'1.2-2'
                            }}

                        </td>

                        <!-- reason new -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="."
                                inputmode="decimal" class="form-control form-control-sm" [(ngModel)]="item.newQty"
                                (ngModelChange)="updateDetailItems()">

                            <textarea class="form-control form-control-sm mt-1" rows="2" placeholder="เหตุผลการขอใหม่"
                                [(ngModel)]="item.reasonNew" (ngModelChange)="updateDetailItems()">

                            </textarea>

                        </td>

                        <!-- reason replace -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="."
                                inputmode="decimal" class="form-control form-control-sm" [(ngModel)]="item.replaceQty"
                                (ngModelChange)="updateDetailItems()">

                            <textarea class="form-control form-control-sm mt-1" rows="2" placeholder="เหตุผลการทดแทน"
                                [(ngModel)]="item.reasonReplace" (ngModelChange)="updateDetailItems()">

                            </textarea>

                        </td>

                        <!-- remove -->
                        <td>

                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">

                                🗑

                            </button>

                        </td>

                    </tr>

                </tbody>

                <!-- footer -->
                <tfoot>

                    <tr>

                        <td colspan="6" class="text-end fw-bold">

                            รวม

                        </td>

                        <td class="text-end fw-bold text-primary">

                            {{
                            grandTotal
                            | number:'1.2-2'
                            }}

                        </td>

                        <td colspan="3"></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <!-- spec -->
        <div class="mt-3">

            <label class="fw-semibold">

                คุณสมบัติ (spec)

            </label>

            <textarea class="form-control" rows="4" [(ngModel)]="spec" (ngModelChange)="updateDetailItems()">

            </textarea>

        </div>

        <!-- action -->
        <div class="mt-3">

            <button class="btn btn-primary btn-sm" (click)="addItem()">

                + เพิ่มรายการ

            </button>

            <span class="ms-2 text-danger">

                จำนวน {{ items.length }} รายการ

            </span>

        </div>

    </div>

</div>
