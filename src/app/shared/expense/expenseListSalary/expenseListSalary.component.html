<div class="card-body">

    <div class="table-responsive">

        <table class="table table-bordered align-middle text-center">

            <thead class="table-secondary">
                <tr>
                    <th class="text-start">รายการ</th>

                    <th style="width:150px">
                        จำนวนคน
                    </th>

                    <th *ngIf="model.selectedExpenseTypeId == 5" style="width:200px">
                        ต่อ/เดือน
                    </th>

                    <th style="width:200px">
                        วงเงิน/ปี
                    </th>

                </tr>
            </thead>

            <tbody>

                <tr>

                    <td class="text-start">
                        อัตราเดิม
                    </td>

                    <td>
                        <input type="number" class="form-control text-center" [(ngModel)]="model.oldQty"
                            (ngModelChange)="calculateAll()">
                    </td>

                    <td *ngIf="model.selectedExpenseTypeId == 5">

                        <input type="number" class="form-control text-end" [(ngModel)]="model.oldMonth"
                            (ngModelChange)="calculateAll()">

                    </td>

                    <td>
                        <input type="number" class="form-control text-end" [(ngModel)]="model.oldYear"
                            [readonly]="model.selectedExpenseTypeId == 5">
                    </td>

                </tr>


                <tr>

                    <td class="text-start">
                        อัตราใหม่
                    </td>

                    <td>
                        <input type="number" class="form-control text-center" [(ngModel)]="model.newQty"
                            (ngModelChange)="calculateAll()">
                    </td>

                    <td *ngIf="model.selectedExpenseTypeId == 5">

                        <input type="number" class="form-control text-end" [(ngModel)]="model.newMonth"
                            (ngModelChange)="calculateAll()">

                    </td>

                    <td>
                        <input type="number" class="form-control text-end" [(ngModel)]="model.newYear"
                            [readonly]="model.selectedExpenseTypeId == 5">
                    </td>

                </tr>

            </tbody>


            <tfoot class="table-secondary fw-bold">

                <tr>
                    <td class="text-end">รวม</td>

                    <td>
                        {{ totalQty }}
                    </td>

                    <td *ngIf="model.selectedExpenseTypeId == 5"></td>

                    <td class="text-end">
                        {{ totalAmount | number:'1.2-2' }}
                    </td>

                </tr>

            </tfoot>

        </table>

    </div>

    <!-- แนบไฟล์ -->
    <div class="mt-3">

        <label class="form-label fw-bold">
            แนบไฟล์
        </label>

        <input type="file" class="form-control" (change)="onFileChange($event)">

        <small class="text-muted">
            คลิกชื่อไฟล์เพื่อดูตัวอย่าง
        </small>

    </div>

</div>
