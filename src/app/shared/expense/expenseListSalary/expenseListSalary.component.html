<div class="expense-table-responsive">
    <table class="table table-bordered align-middle text-center expense-table mb-0" style="table-layout: fixed;">
        <thead class="text-center text-white expense-table-header">
            <tr>
                <th class="text-start" style="width:30%">รายการ</th>
                <th style="width:20%">จำนวนคน</th>
                <th *ngIf="model.selectedExpenseTypeId == 5" style="width:25%">ต่อ/เดือน</th>
                <th style="width:25%">วงเงิน/ปี</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td class="text-start">อัตราเดิม</td>

                <td>
                    <input type="text" class="form-control text-center" mask="separator.2" thousandSeparator=","
                        decimalMarker="." inputmode="decimal" [(ngModel)]="model.oldQty"
                        (ngModelChange)="calculateRowOld()">
                </td>

                <td *ngIf="model.selectedExpenseTypeId == 5">
                    <input type="text" class="form-control text-end" mask="separator.2" thousandSeparator=","
                        decimalMarker="." inputmode="decimal" [(ngModel)]="model.oldMonth"
                        (ngModelChange)="calculateRowOld()" >
                </td>

                <td>
                    <input type="text" class="form-control text-end" mask="separator.2" thousandSeparator=","
                        decimalMarker="." inputmode="decimal" [(ngModel)]="model.oldYear"
                        (ngModelChange)="calculateRowOld()" >
                </td>
            </tr>

            <tr>
                <td class="text-start">อัตราใหม่</td>

                <td>
                    <input type="text" class="form-control text-center" mask="separator.2" thousandSeparator=","
                        decimalMarker="." inputmode="decimal" [(ngModel)]="model.newQty"
                        (ngModelChange)="calculateRowNew()">
                </td>

                <td *ngIf="model.selectedExpenseTypeId == 5">
                    <input type="text" class="form-control text-end" mask="separator.2" thousandSeparator=","
                        decimalMarker="." inputmode="decimal" [(ngModel)]="model.newMonth"
                        (ngModelChange)="calculateRowNew()" >
                </td>

                <td>
                    <input type="text" class="form-control text-end" mask="separator.2" thousandSeparator=","
                        decimalMarker="." inputmode="decimal" [(ngModel)]="model.newYear"
                        (ngModelChange)="calculateRowNew()">

                </td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td class="text-end">รวม</td>
                <td class="text-end">{{ totalQty | number:'1.2-2' }}</td>
                <td *ngIf="model.selectedExpenseTypeId == 5"></td>
                <td class="text-end">{{ totalAmount | number:'1.2-2' }}</td>
            </tr>
        </tfoot>
    </table>
</div>
