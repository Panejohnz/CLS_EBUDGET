<div class="card-body">

    <div class="table-responsive">

        <table class="table table-bordered align-middle text-center">

            <thead class="table-secondary">

                <tr>

                    <th class="text-start">
                        รายการ
                    </th>

                    <th style="width:150px">
                        จำนวนคน
                    </th>

                    <th *ngIf="model.selectedExpenseTypeId == 5" style="width:200px">

                        ต่อ/เดือน

                    </th>

                    <th style="width:200px">
                        วงเงิน/ปี
                    </th>

                </tr>

            </thead>

            <tbody>

                <!-- อัตราเดิม -->
                <tr>

                    <td class="text-start">
                        อัตราเดิม
                    </td>

                    <td>

                        <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control text-center" [(ngModel)]="model.oldQty"
                            (ngModelChange)="calculateRowOld()">

                    </td>

                    <td *ngIf="model.selectedExpenseTypeId == 5">

                        <input type="text" class="form-control text-end" [ngModel]="model.oldMonth | number:'1.0-2'"
                            (ngModelChange)="onAmountChange($event, 'oldMonth')">

                    </td>

                    <td>
                        <input type="text" class="form-control text-end" [ngModel]="model.oldYear | number:'1.0-2'"
                            (ngModelChange)="onAmountChange($event, 'oldYear')" [readonly]="false">
                    </td>

                </tr>

                <!-- อัตราใหม่ -->
                <tr>

                    <td class="text-start">
                        อัตราใหม่
                    </td>

                    <td>

                        <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control text-center" [(ngModel)]="model.newQty"
                            (ngModelChange)="calculateRowNew()">

                    </td>

                    <td *ngIf="model.selectedExpenseTypeId == 5">

                        <input type="text" class="form-control text-end" [ngModel]="model.newMonth | number:'1.0-2'"
                            (ngModelChange)="onAmountChange($event, 'newMonth')">
                    </td>

                    <td>

                        <input type="text" class="form-control text-end" [ngModel]="model.newYear | number:'1.0-2'"
                            (ngModelChange)="onAmountChange($event, 'newYear')" [readonly]="false">

                    </td>

                </tr>

            </tbody>

            <!-- footer -->
            <tfoot class="table-secondary fw-bold">

                <tr>

                    <td class="text-end">
                        รวม
                    </td>

                    <td>
                        {{ totalQty | number:'1.0-2' }}
                    </td>

                    <td *ngIf="model.selectedExpenseTypeId == 5"></td>

                    <td class="text-end">

                        {{ totalAmount | number:'1.0-2' }}

                    </td>

                </tr>

            </tfoot>

        </table>

    </div>

    <!-- แนบไฟล์ -->
    <div class="mt-3">

        <label class="form-label fw-bold">

            แนบไฟล์

        </label>

        <input type="file" class="form-control" (change)="onFileChange($event)">

        <small class="text-muted">

            คลิกชื่อไฟล์เพื่อดูตัวอย่าง

        </small>

    </div>

</div>
