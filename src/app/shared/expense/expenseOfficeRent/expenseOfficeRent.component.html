<div class="container-fluid bg-light p-3">

  <div class="card shadow-sm border-0">

    <!-- <div class="card-header bg-light fw-semibold">
      แบบฟอร์มค่าเช่าทรัพย์สิน
    </div> -->

    <div class="card-body p-0">

      <div class="table-responsive">

        <table class="table table-bordered align-middle text-center mb-0">

          <thead class="table-secondary">

            <tr>

              <th style="width:20%">
                รายการทรัพย์สิน
              </th>

              <th style="width:12%">
                ขนาดพื้นที่ (ตรม.)
              </th>

              <th style="width:12%">
                ค่าเช่า/ตรม.
              </th>

              <th style="width:12%">
                ค่าเช่า/เดือน
              </th>

              <th style="width:12%">
                ค่าเช่า/ปี
              </th>

              <th style="width:20%">
                วัตถุประสงค์
              </th>

              <th style="width:5%"></th>

            </tr>

          </thead>

          <tbody>

            <tr *ngFor="let item of rentList; let i=index">

              <!-- asset -->
              <td>

                <input class="form-control" [(ngModel)]="item.asset" (ngModelChange)="updateDetailItems()"
                  placeholder="ระบุรายการทรัพย์สิน">

              </td>

              <!-- area -->
              <td>

                <!-- <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control text-end" [(ngModel)]="item.area"
                  (ngModelChange)="calculate(item)"> -->
                <input type="text" class="form-control text-center" [(ngModel)]="item.area">
              </td>


              <!-- rate -->
              <td>

                <input type="text" class="form-control text-end" [value]="item.pricePerSqm"
                  (input)="formatInput($event, item, 'pricePerSqm'); calculate(item)" inputmode="decimal">

              </td>

              <!-- month -->
              <td>

                <input type="text" class="form-control text-end" [value]="item.monthlyRent | number:'1.0-2'"
                  (input)="formatInput($event, item, 'monthlyRent'); calculateYear(item)" inputmode="decimal">

              </td>

              <!-- year -->
              <td>

                <input type="text" class="form-control text-end" [value]="item.yearlyRent | number:'1.0-2'"
                  (input)="formatInput($event, item, 'yearlyRent'); calculateGrand(); updateDetailItems()"
                  inputmode="decimal">

              </td>
              <!-- rate -->
              <!-- <td>

                <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control text-end" [(ngModel)]="item.pricePerSqm"
                  (ngModelChange)="calculate(item)">

              </td> -->

              <!-- month -->
              <!-- <td>

                <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control text-end" [(ngModel)]="item.monthlyRent"
                  (ngModelChange)="calculateYear(item)">

              </td> -->

              <!-- year -->
              <!-- <td>

                <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control text-end" [(ngModel)]="item.yearlyRent"
                  (ngModelChange)="calculateGrand(); updateDetailItems()">

              </td> -->

              <!-- purpose -->
              <td>

                <textarea class="form-control" rows="2" [(ngModel)]="item.purpose" (ngModelChange)="updateDetailItems()"
                  placeholder="ระบุวัตถุประสงค์">
                                </textarea>

              </td>

              <!-- delete -->
              <td>

                <button class="btn btn-sm btn-outline-danger" (click)="removeRow(i)">

                  🗑

                </button>

              </td>

            </tr>

          </tbody>

          <tfoot class="table-secondary fw-semibold">

            <tr>

              <td class="text-end">

              </td>

              <!-- total area -->
              <td class="text-end">

                รวมทั้งสิ้น

              </td>

              <!-- total rate -->
              <td class="text-end">

                {{
                totalRate
                | number:'1.2-2'
                }}

              </td>

              <!-- total month -->
              <td class="text-end">

                {{
                totalMonth
                | number:'1.2-2'
                }}

              </td>

              <!-- total year -->
              <td class="text-end text-primary">

                {{
                totalYear
                | number:'1.2-2'
                }}

              </td>

              <td colspan="3"></td>

            </tr>

          </tfoot>

        </table>

      </div>

    </div>

  </div>

  <!-- footer -->
  <div class="d-flex justify-content-between mt-3">

    <button class="btn btn-outline-primary btn-sm" (click)="addRow()">

      + เพิ่มรายการ

    </button>

    <span class="text-danger">

      จำนวน {{rentList.length}} รายการ

    </span>

  </div>

</div>
