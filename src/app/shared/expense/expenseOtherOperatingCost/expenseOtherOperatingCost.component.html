<div class="expense-table-responsive">

    <table class="table table-bordered align-middle expense-table text-center mb-0">

        <!-- header -->
        <thead class="text-center text-white expense-table-header">

            <tr>

                <th style="width:5%">

                    ลำดับ

                </th>

                <th style="width:45%">

                    รายการ

                </th>

                <th style="width:10%">

                    จำนวน

                </th>

                <th style="width:15%">

                    ราคา/หน่วย

                </th>

                <th style="width:15%">

                    รวมค่าใช้จ่าย

                </th>

                <th style="width:5%">ลบ</th>

            </tr>


        </thead>

        <!-- BODY -->
        <tbody>

            <tr *ngFor="let item of items; let i = index">

                <!-- index -->
                <td>

                    {{ i + 1 }}

                </td>

                <!-- name -->
                <td>

                    <input type="text" class="form-control" [(ngModel)]="item.name" placeholder="ระบุรายการ"
                        (ngModelChange)="updateDetailItems()">

                </td>

                <!-- qty -->
                <td>

                    <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal"
                        placeholder="ระบุจำนวน" class="form-control text-center" [(ngModel)]="item.quantity"
                        (ngModelChange)="updateDetailItems()">

                </td>

                <!-- price -->
                <td>

                    <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal"
                        placeholder="ระบุราคา/หน่วย" class="form-control text-end" [(ngModel)]="item.price"
                        (ngModelChange)="updateDetailItems()">

                </td>

                <!-- total -->
                <td class="text-end fw-bold">

                    {{
                    getTotal(item)
                    | number:'1.2-2'
                    }}

                </td>

                <!-- remove -->
                <td>

                    <button class="btn btn-danger btn-sm" (click)="removeItem(i)">

                        <i class="bx bx-trash"></i>

                    </button>

                </td>

            </tr>

        </tbody>

        <!-- FOOTER -->
        <tfoot>

            <tr class="expense-table-header">

                <td colspan="4" class="text-end">

                    รวมทั้งสิ้น

                </td>


                <td class="text-end text-white fw-bold">

                    {{
                    getGrandTotal()
                    | number:'1.2-2'
                    }}

                </td>

                <td></td>

            </tr>

        </tfoot>

    </table>

</div>

<!-- ACTION -->
<div class="d-flex justify-content-between align-items-center p-3">

    <div>

        <button class="btn btn-primary" (click)="addItem()">

            <i class="bx bx-plus text-black"></i>
            <span class="text-black"> เพิ่มรายการ</span>


        </button>

        <span class="ms-3 text-danger">

            จำนวน {{ items.length }} รายการ

        </span>

    </div>

</div>
