<div class="container-fluid bg-light p-3">

    <div class="card shadow-sm">

        <div class="card-body p-0">

            <div class="table-responsive">

                <table class="table table-bordered mb-0 text-center align-middle">

                    <!-- HEADER -->
                    <thead class="table-secondary">

                        <tr>

                            <th style="width:5%">

                                ลำดับ

                            </th>

                            <th style="width:45%">

                                รายการ

                            </th>

                            <th colspan="3">

                                ค่าใช้สอย

                            </th>

                            <th style="width:5%"></th>

                        </tr>

                        <tr>

                            <th></th>

                            <th></th>

                            <th style="width:10%">

                                จำนวน

                            </th>

                            <th style="width:15%">

                                ราคา/หน่วย

                            </th>

                            <th style="width:15%">

                                รวม

                            </th>

                            <th></th>

                        </tr>

                    </thead>

                    <!-- BODY -->
                    <tbody>

                        <tr *ngFor="let item of items; let i = index">

                            <!-- index -->
                            <td>

                                {{ i + 1 }}

                            </td>

                            <!-- name -->
                            <td>

                                <input type="text" class="form-control" [(ngModel)]="item.name"
                                    (ngModelChange)="updateDetailItems()">

                            </td>

                            <!-- qty -->
                            <td>

                                <input type="number" class="form-control text-end" [(ngModel)]="item.quantity"
                                    (ngModelChange)="updateDetailItems()">

                            </td>

                            <!-- price -->
                            <td>

                                <input type="number" class="form-control text-end" [(ngModel)]="item.price"
                                    (ngModelChange)="updateDetailItems()">

                            </td>

                            <!-- total -->
                            <td class="text-end fw-bold">

                                {{
                                getTotal(item)
                                | number:'1.2-2'
                                }}

                            </td>

                            <!-- remove -->
                            <td>

                                <button class="btn btn-outline-danger btn-sm" (click)="removeItem(i)">

                                    🗑

                                </button>

                            </td>

                        </tr>

                    </tbody>

                    <!-- FOOTER -->
                    <tfoot>

                        <tr class="bg-light fw-bold">

                            <td colspan="2" class="text-end">

                                รวมทั้งสิ้น

                            </td>

                            <td>

                                {{ getTotalQty() }}

                            </td>

                            <td></td>

                            <td class="text-end text-primary">

                                {{
                                getGrandTotal()
                                | number:'1.2-2'
                                }}

                            </td>

                            <td></td>

                        </tr>

                    </tfoot>

                </table>

            </div>

            <!-- ACTION -->
            <div class="d-flex justify-content-between align-items-center p-3">

                <div>

                    <button class="btn btn-primary btn-sm" (click)="addItem()">

                        + เพิ่มรายการ

                    </button>

                    <span class="ms-3 text-danger">

                        จำนวน {{ items.length }} รายการ

                    </span>

                </div>

            </div>

        </div>

    </div>

</div>
