<div class="card bg-light border-0">

    <div class="card-header bg-light fw-bold">


    </div>

    <div class="card-body">

        <div *ngFor="let item of committeeList; let i=index" class="card shadow-sm border-0 mb-4">

            <!-- header -->
            <div class="card-header bg-white border-bottom">

                <div class="d-flex justify-content-between align-items-center gap-2">

                    <div class="flex-grow-1">

                        <label class="form-label fw-bold mb-2">

                            รายชื่อคณะกรรมการ / คณะอนุกรรมการ

                        </label>

                        <input class="form-control" [(ngModel)]="item.committeeName"
                            (ngModelChange)="updateDetailItems()" placeholder="ระบุชื่อคณะกรรมการ">

                    </div>

                    <button class="btn btn-outline-danger btn-sm mt-4" (click)="removeRow(i)">

                        <i class="bx bx-trash"></i>

                    </button>

                </div>

            </div>

            <!-- body -->
            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-bordered align-middle text-center mb-0">

                        <thead class="table-light">

                            <tr>

                                <th class="text-start">

                                    ตำแหน่ง

                                </th>

                                <th style="width:120px">

                                    จำนวนคน

                                </th>

                                <th style="width:140px">

                                    จำนวนวัน/ครั้ง

                                </th>

                                <th style="width:180px">

                                    ค่าตอบแทน (บาท)

                                </th>

                                <th style="width:180px">

                                    รวม (บาท)

                                </th>

                            </tr>

                        </thead>

                        <tbody>

                            <tr *ngFor="let role of item.roles">

                                <!-- role -->
                                <td class="text-start fw-semibold align-middle">

                                    {{ role.name }}

                                </td>

                                <!-- qty -->
                                <td>

                                    <input type="number" class="form-control text-center" [(ngModel)]="role.qty"
                                        (ngModelChange)="calculate(i)">

                                </td>

                                <!-- day -->
                                <td>

                                    <input type="number" class="form-control text-center" [(ngModel)]="role.day"
                                        (ngModelChange)="calculate(i)">

                                </td>

                                <!-- rate -->
                                <td>

                                    <input type="text" class="form-control text-end"
                                        [ngModel]="role.rate | number:'1.0-2'"
                                        (ngModelChange)="onRateChange($event, role, i)">

                                </td>

                                <!-- total -->
                                <td class="text-end fw-bold bg-light align-middle">

                                    {{ role.total | number:'1.2-2' }}

                                </td>

                            </tr>

                        </tbody>

                        <tfoot class="table-light">

                            <tr>

                                <td colspan="4" class="text-end fw-bold">

                                    รวมทั้งหมด

                                </td>

                                <td class="text-end fw-bold fs-6">

                                    {{ item.total | number:'1.2-2' }}

                                </td>

                            </tr>

                        </tfoot>

                    </table>

                </div>

            </div>

        </div>

        <!-- add -->
        <div class="mb-2">

            <button class="btn btn-primary btn-sm" (click)="addRow()">

                <i class="bx bx-plus"></i>

                เพิ่มรายการ

            </button>

            <span class="text-danger ms-2">

                จำนวน
                {{committeeList.length}}
                รายการ

                รวมทั้งสิ้น

                {{grandTotal | number:'1.2-2'}}

                บาท

            </span>

        </div>

    </div>

</div>
