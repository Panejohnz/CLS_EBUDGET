<div class="container-fluid bg-light p-3">

  <div class="card shadow-sm">

    <div class="card-header bg-light fw-bold">

      แบบฟอร์มค่าซ่อมยานพาหนะและขนส่ง

    </div>

    <div class="card-body p-0">

      <div class="expense-table-responsive">

        <table class="table table-bordered expense-table mb-0 align-middle text-center">

          <!-- header -->
          <thead class="text-center text-white expense-table-header">

            <tr>

              <th style="width:5%">
                ลำดับ
              </th>

              <th style="width:45%">
                รายการ
              </th>

              <th colspan="3">
                จำนวน
              </th>

              <th style="width:5%"></th>

            </tr>

            <tr>

              <th></th>

              <th></th>

              <th style="width:10%">
                คัน
              </th>

              <th style="width:15%">
                ค่าซ่อม/คัน
              </th>

              <th style="width:15%">
                รวม
              </th>

              <th></th>

            </tr>

          </thead>

          <!-- body -->
          <tbody>

            <tr *ngFor="let item of items; let i=index">

              <!-- no -->
              <td>

                {{ i + 1 }}

              </td>

              <!-- item -->
              <td>

                <select class="form-select" [(ngModel)]="item.name" (change)="onSelectChange(item)">

                  <option value="">
                    --- รายการ ---
                  </option>

                  <option value="รถที่มีอายุการใช้งาน 4-6 ปี หรือ 60,000-120,000 กิโลเมตร">

                    รถที่มีอายุการใช้งาน 4-6 ปี
                    หรือ 60,000-120,000 กิโลเมตร

                  </option>

                  <option value="รถที่มีอายุการใช้งาน 6 ปี หรือ 120,000 กิโลเมตร">

                    รถที่มีอายุการใช้งาน 6 ปี
                    หรือ 120,000 กิโลเมตร

                  </option>

                  <option value="อื่นๆ">

                    อื่นๆ

                  </option>

                </select>

                <!-- custom -->
                <input *ngIf="item.name === 'อื่นๆ'" type="text" class="form-control mt-1" placeholder="ระบุรายการ"
                  [(ngModel)]="item.customName" (ngModelChange)="updateDetailItems()">

              </td>

              <!-- qty -->
              <td>

                <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control text-end" [(ngModel)]="item.quantity"
                  (ngModelChange)="calculate()">

              </td>

              <!-- price -->
              <td>

                <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control text-end" [(ngModel)]="item.price"
                  (ngModelChange)="calculate()">

              </td>

              <!-- total -->
              <td class="text-end fw-bold text-success">

                {{
                getTotal(item)
                | number:'1.2-2'
                }}

              </td>

              <!-- delete -->
              <td>

                <button class="btn btn-outline-danger btn-sm" (click)="removeItem(i)">

                  🗑

                </button>

              </td>

            </tr>

          </tbody>

        </table>

      </div>

      <!-- footer -->
      <div class="d-flex justify-content-between align-items-center p-3 border-top">

        <!-- left -->
        <div>

          <button class="btn btn-primary btn-sm" (click)="addItem()">

            + เพิ่มรายการ

          </button>

          <span class="ms-3 text-danger">

            จำนวน {{ items.length }} รายการ

          </span>

        </div>

        <!-- right -->
        <div class="text-end">

          <div class="fw-bold">

            รวมทั้งหมด :

            <span class="text-success">

              {{
              getGrandTotal()
              | number:'1.2-2'
              }}

              บาท

            </span>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
