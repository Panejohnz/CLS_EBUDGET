<div class="card shadow-sm">

    <div class="card-body bg-light">

        <div class="table-responsive">

            <table class="table table-bordered align-middle text-center bg-white mb-0">

                <tbody>

                    <ng-container *ngFor="let group of groups; let gi = index">

                        <!-- กลุ่มหลัก -->
                        <tr class="table-light">

                            <!-- ลำดับ -->
                            <td width="5%" class="fw-bold">

                                {{ gi + 1 }}

                            </td>

                            <!-- detail -->
                            <td colspan="6" class="text-start">

                                <!-- ชื่อรายการ -->
                                <input class="form-control form-control-sm mb-2" [(ngModel)]="group.name"
                                    (ngModelChange)="updateDetailItems()" placeholder="ระบุรายการ">

                                <!-- วัตถุประสงค์ -->
                                <textarea class="form-control form-control-sm mb-2" rows="2"
                                    [(ngModel)]="group.objective" (ngModelChange)="updateDetailItems()"
                                    placeholder="วัตถุประสงค์"></textarea>

                                <!-- ผลที่คาดว่าจะได้รับ -->
                                <textarea class="form-control form-control-sm" rows="2" [(ngModel)]="group.result"
                                    (ngModelChange)="updateDetailItems()" placeholder="ผลที่คาดว่าจะได้รับ"></textarea>

                            </td>

                            <!-- total -->
                            <td class="text-end fw-bold align-top text-primary">

                                {{
                                group.total
                                | number:'1.2-2'
                                }}

                            </td>

                            <!-- delete -->
                            <td class="align-top">

                                <button class="btn btn-danger btn-sm" (click)="removeGroup(gi)">

                                    🗑

                                </button>

                            </td>

                        </tr>

                        <!-- header item -->
                        <tr class="table-secondary">

                            <td></td>

                            <td width="25%">
                                รายการย่อย
                            </td>

                            <td width="12%">
                                จำนวน/ระยะเวลา
                            </td>

                            <td width="12%">
                                จำนวน/บาท
                            </td>

                            <td width="12%">
                                จำนวน/ครั้ง
                            </td>

                            <td width="12%">
                                อัตราที่ใช้
                            </td>

                            <td width="15%">
                                รวม
                            </td>

                            <td width="5%"></td>

                            <td width="2%"></td>

                        </tr>

                        <!-- รายการย่อย -->
                        <tr *ngFor="let item of group.items; let i = index">

                            <td></td>

                            <!-- item name -->
                            <td>

                                <input class="form-control form-control-sm" [(ngModel)]="item.name"
                                    (ngModelChange)="updateDetailItems()">

                            </td>

                            <!-- duration -->
                            <td>

                                <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end"
                                    [(ngModel)]="item.duration" (ngModelChange)="calculate(gi,i)">

                            </td>

                            <!-- amount -->
                            <td>

                                <input type="text" class="form-control form-control-sm text-end"
                                    mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal"
                                    [(ngModel)]="item.amount" (ngModelChange)="calculate(gi,i)">

                            </td>

                            <!-- times -->
                            <td>

                                <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end"
                                    [(ngModel)]="item.times" (ngModelChange)="calculate(gi,i)">

                            </td>

                            <!-- rate -->
                            <td>

                                <input type="text" class="form-control form-control-sm text-end"
                                    mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal"
                                    [(ngModel)]="item.rate" (ngModelChange)="calculate(gi,i)">

                            </td>

                            <!-- total -->
                            <td class="text-end fw-bold">

                                {{
                                item.total
                                | number:'1.2-2'
                                }}

                            </td>

                            <!-- remove -->
                            <td>

                                <button class="btn btn-danger btn-sm" (click)="removeItem(gi,i)">

                                    🗑

                                </button>

                            </td>

                            <td></td>

                        </tr>

                        <!-- add item -->
                        <tr>

                            <td></td>

                            <td colspan="7" class="text-start">

                                <button class="btn btn-primary btn-sm" (click)="addItem(gi)">

                                    + เพิ่มรายการย่อย

                                </button>

                            </td>

                            <td></td>

                        </tr>

                    </ng-container>

                </tbody>

                <!-- footer -->
                <tfoot>

                    <tr class="table-secondary">

                        <td colspan="7" class="text-end fw-bold">

                            รวมทั้งสิ้น

                        </td>

                        <td class="text-end fw-bold text-primary">

                            {{
                            grandTotal
                            | number:'1.2-2'
                            }}

                        </td>

                        <td></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <!-- add group -->
        <div class="mt-3">

            <button class="btn btn-primary btn-sm" (click)="addGroup()">

                + เพิ่มรายการ

            </button>

            <span class="ms-2 text-danger">

                จำนวน {{ groups.length }} รายการ

            </span>

        </div>

    </div>

</div>
