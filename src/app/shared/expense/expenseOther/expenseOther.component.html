<div class="card bg-light border">

    <div class="card-header bg-light fw-bold">

        แบบฟอร์มค่าใช้จ่ายอื่นๆ

    </div>

    <div class="card-body p-2">

        <div class="expense-table-responsive">

            <table class="table table-bordered align-middle expense-table text-center mb-0">

                <!-- header -->
                <thead class="text-center text-white expense-table-header">

                    <tr>

                        <th width="5%">
                            ลำดับ
                        </th>

                        <th style="width:25%">
                            ระบุชื่อรายการ
                        </th>

                        <th style="width:10%">
                            จำนวนรายการ
                        </th>

                        <th style="width:15%">
                            จำนวนเงิน (บาท)
                        </th>

                        <th style="width:10%">
                            จำนวนเดือน
                        </th>

                        <th style="width:15%">
                            รวมรายปี
                        </th>

                        <th style="width:5%"></th>

                    </tr>

                </thead>

                <!-- body -->
                <tbody>

                    <tr *ngFor="let item of rentItems; let i=index">

                        <!-- no -->
                        <td>

                            {{ i + 1 }}

                        </td>

                        <!-- name -->
                        <td>

                            <input class="form-control form-control-sm" [(ngModel)]="item.name"
                                (ngModelChange)="updateDetailItems()" placeholder="ระบุชื่อรายการ">

                        </td>

                        <!-- qty -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-center" [(ngModel)]="item.qty"
                                (ngModelChange)="calculate(item)">

                        </td>

                        <!-- price -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="item.price"
                                (ngModelChange)="calculate(item)">

                        </td>

                        <!-- month -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-center"
                                [(ngModel)]="item.months" (ngModelChange)="calculate(item)">

                        </td>

                        <!-- total -->
                        <td>

                            <input class="form-control form-control-sm text-end fw-bold text-primary"
                                [value]="item.total | number:'1.2-2'" readonly>

                        </td>

                        <!-- delete -->
                        <td>

                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">

                                <i class="bx bx-trash"></i>

                            </button>

                        </td>

                    </tr>

                </tbody>

                <!-- footer -->
                <tfoot>

                    <tr class="table-light fw-bold">

                        <td colspan="5" class="text-end">

                            รวม

                        </td>

                        <td class="text-end text-primary">

                            {{
                            grandTotal
                            | number:'1.2-2'
                            }}

                        </td>

                        <td colspan="2"></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <!-- footer action -->
        <div class="d-flex justify-content-between align-items-center mt-3">

            <div>

                <button class="btn btn-secondary btn-sm" (click)="addItem()">

                    เพิ่มรายการ

                </button>

                <span class="ms-3 text-danger small">

                    จำนวน {{ rentItems.length }} รายการ

                </span>

            </div>

        </div>

    </div>

</div>
