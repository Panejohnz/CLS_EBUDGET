<div class="card shadow-sm">

    <!-- header -->
    <div
        class="card-header bg-light d-flex justify-content-between align-items-center">

        <!-- <span class="fw-bold">

            แบบฟอร์มค่าจ้างเหมาบริการเครื่องถ่ายเอกสาร

        </span> -->

        <button
            class="btn btn-primary btn-sm"
            (click)="addItem()">

            + เพิ่มรายการ

        </button>

    </div>

    <!-- body -->
    <div class="card-body bg-light">

        <div class="table-responsive">

            <table
                class="table table-bordered align-middle text-center bg-white mb-0">

                <thead class="table-light">

                    <tr>

                        <th style="width:5%">
                            ลำดับ
                        </th>

                        <th style="width:25%">
                            รายการ
                        </th>

                        <th style="width:12%">
                            จำนวนเครื่อง
                        </th>

                        <th style="width:12%">
                            จำนวนเดือน
                        </th>
<th style="width:12%">
                            อัตรา(บาท)
                        </th>
                        <th style="width:12%">
                            รวมทั้งสิ้น
                        </th>

                        <th style="width:4%"></th>

                    </tr>

                </thead>

                <tbody>

                    <tr *ngFor="let item of items; let i=index">

                        <!-- no -->
                        <td>

                            {{ i + 1 }}

                        </td>

                        <!-- type -->
                        <td class="text-start">

                            <select
                                class="form-select form-select-sm mb-1"
                                [(ngModel)]="item.type"
                                (change)="updateDetailItems()">

                                <option value="">
                                    --- รายการ ---
                                </option>

                                <option value="5000">
                                    ปริมาณขั้นต่ำ 5,000 แผ่น
                                </option>

                                <option value="10000">
                                    ปริมาณขั้นต่ำ 10,000 แผ่น
                                </option>

                                <option value="other">
                                    อื่นๆ (ระบุ)
                                </option>

                            </select>

                            <!-- other -->
                            <input
                                *ngIf="item.type == 'other'"
                                type="text"
                                class="form-control form-control-sm"
                                [(ngModel)]="item.otherDetail"
                                (ngModelChange)="updateDetailItems()"
                                placeholder="ระบุรายละเอียด">

                        </td>

                        <!-- qty -->
                        <td>

                            <input
                                type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal"
                                class="form-control form-control-sm text-center"
                                [(ngModel)]="item.qty"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- month -->
                        <td>

                            <input
                                type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal"
                                class="form-control form-control-sm text-center"
                                [(ngModel)]="item.month"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- price -->
                        <td>
                        
                            <!-- <input
                                                        type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal"
                                                        class="form-control form-control-sm text-end"
                                                        [(ngModel)]="item.price"
                                                        (ngModelChange)="calculate(i)"> -->
                           <input
    type="text"
    class="form-control form-control-sm text-end"

    [ngModel]="formatNumber(item.price)"

    (ngModelChange)="onPriceChange($event, item, i)"

    inputmode="decimal">
                        
                        </td>

                        <!-- total -->
                        <td class="fw-bold text-end">

                            {{
                                item.total
                                | number:'1.2-2'
                            }}

                        </td>

                        <!-- delete -->
                        <td>

                            <button
                                class="btn btn-danger btn-sm"
                                (click)="removeItem(i)">

                                🗑

                            </button>

                        </td>

                    </tr>

                </tbody>

                <!-- footer -->
                <tfoot class="table-light fw-bold">

                    <tr>

                        <td colspan="5" class="text-end">

                            รวมทั้งสิ้น

                        </td>

                        <td class="text-end text-primary">

                            {{
                                grandTotal
                                | number:'1.2-2'
                            }}

                        </td>

                        <td colspan="2"></td>

                    </tr>

                </tfoot>

            </table>

        </div>

    </div>

</div>
