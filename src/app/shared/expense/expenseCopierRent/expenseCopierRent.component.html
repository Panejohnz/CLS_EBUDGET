
        <div class="expense-table-responsive">
            <table class="table table-bordered align-middle text-center expense-table mb-0" style="table-layout: fixed;">
                <thead class="text-center text-white expense-table-header">
                    <tr>
                        <th style="width:5%">ลำดับ</th>
                        <th style="width:25%">รายการ</th>
                        <th style="width:12%">จำนวนเครื่อง</th>
                        <th style="width:12%">จำนวนเดือน</th>
                        <th style="width:12%">อัตรา(บาท)</th>
                        <th style="width:12%">รวมทั้งสิ้น</th>
                        <th style="width:4%">ลบ</th>
                    </tr>
                </thead>

                <tbody>
                    <tr *ngFor="let item of items; let i = index">
                        <td>{{ i + 1 }}</td>

                        <td class="text-start">
                            <ng-select class="mb-1" appendTo="body" dropdownPosition="auto"
                                [items]="Mas_Expense_Detial_List" bindLabel="Expense_Detial_Name"
                                bindValue="Expense_Detial_Name" [(ngModel)]="item.type"
                                name="copier_rent_type_{{i}}" placeholder="-- เลือกรายการ --"
                                [clearable]="false" (change)="onTypeChange(item, i)">
                            </ng-select>

                            <input *ngIf="isOtherType(item)" type="text" class="form-control"
                                [(ngModel)]="item.otherDetail" (ngModelChange)="updateDetailItems()"
                                placeholder="ระบุรายละเอียด">
                        </td>

                        <td>
                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="."
                                inputmode="decimal" class="form-control text-center" [(ngModel)]="item.qty"
                                (ngModelChange)="calculate(i)"    placeholder="ระบุจำนวนเครื่อง">
                        </td>

                        <td>
                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="."
                                inputmode="decimal" class="form-control text-center" [(ngModel)]="item.month"
                                (ngModelChange)="calculate(i)" placeholder="ระบุจำนวนเดือน">
                        </td>

                        <td>
                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="."
                            class="form-control text-end" [ngModel]="formatNumber(item.price)"
                                (ngModelChange)="onPriceChange($event, item, i)" placeholder="ระบุอัตรา(บาท)">
                        </td>

                        <td class="fw-bold text-end text-primary">
                            {{ item.total | number:'1.2-2' }}
                        </td>

                        <td>
                            <button class="btn btn-sm btn-outline-danger" (click)="removeItem(i)">
                                <i class="bx bx-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>

                <tfoot>
                    <tr>
                        <td colspan="5" class="text-end">รวมทั้งสิ้น</td>
                        <td class="text-end">{{ grandTotal | number:'1.2-2' }}</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <div class="d-flex justify-content-between mt-3">
            <div>
                <button class="btn btn-primary" (click)="addItem()">
                    <i class="bx bx-plus"></i>
                    เพิ่มรายการ
                </button>
                <span class="text-danger ms-2">จำนวน {{ items.length }} รายการ</span>
            </div>
        </div>
