<div class="card shadow-sm">

    <div class="card-body bg-light">

        <div class="expense-table-responsive">

            <table class="table table-bordered align-middle expense-table text-center bg-white mb-0">

                <!-- HEADER -->
                <thead class="text-center text-white expense-table-header">

                    <tr>

                        <th width="5%">

                            ลำดับ

                        </th>

                        <th width="25%">

                            รายการ

                        </th>

                        <th width="10%">

                            จำนวน

                        </th>

                        <th width="15%">

                            หน่วยนับ

                        </th>

                        <th width="15%">

                            ราคา/หน่วย (บาท)

                        </th>

                        <th width="15%">

                            รวม (บาท)

                        </th>

                        <th width="15%">

                            หมายเหตุ

                        </th>

                        <th width="5%"></th>

                    </tr>

                </thead>

                <!-- BODY -->
                <tbody>

                    <tr *ngFor="let item of items; let i = index">

                        <!-- index -->
                        <td>

                            {{ i + 1 }}

                        </td>

                        <!-- material -->
                        <td>

                            <!-- type 48 -->
                            <input *ngIf="isTextMode" class="form-control form-control-sm"
                                [(ngModel)]="item.materialName" (ngModelChange)="updateDetailItems()">

                            <!-- ปกติ -->
                            <ng-select *ngIf="!isTextMode" [items]="Mas_Expense_Detial_List"
                                bindLabel="Expense_Detial_Name" bindValue="Expense_Detial_Id"
                                [(ngModel)]="item.material" placeholder="--- โปรดเลือก ---" appendTo="body"
                                (change)="onMaterialChange(item, $event, i)">
                            </ng-select>

                        </td>

                        <!-- qty -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="."
                                inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="item.qty"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- unit -->
                        <td>

                            <ng-select appendTo="body" dropdownPosition="auto" [items]="Mas_Unit_Lists"
                                bindLabel="Unit_Name" bindValue="Unit_Id" [(ngModel)]="item.unitId"
                                name="office_supplies_unit_{{i}}" placeholder="-- เลือกหน่วยนับ --"
                                [clearable]="false" (change)="onUnitChange(item)">
                            </ng-select>

                        </td>

                        <!-- price -->
                        <td>

                            <input [readonly]="!isTextMode" type="text" mask="separator.2" thousandSeparator="," decimalMarker="."
                                inputmode="decimal" class="form-control form-control-sm text-end"
                                [(ngModel)]="item.price" (ngModelChange)="calculate(i)">

                        </td>

                        <!-- total -->
                        <td class="text-end fw-bold">

                            {{
                            item.total
                            | number:'1.2-2'
                            }}

                        </td>

                        <!-- remark -->
                        <td>

                            <input class="form-control form-control-sm" [(ngModel)]="item.remark"
                                (ngModelChange)="updateDetailItems()">

                        </td>

                        <!-- remove -->
                        <td>

                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">

                                🗑

                            </button>

                        </td>

                    </tr>

                </tbody>

                <!-- FOOTER -->
                <tfoot>

                    <tr>

                        <td colspan="5" class="text-end fw-bold">

                            รวม

                        </td>

                        <td class="text-end fw-bold text-primary">

                            {{
                            grandTotal
                            | number:'1.2-2'
                            }}

                        </td>

                        <td colspan="2"></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <!-- ACTION -->
        <div class="mt-3 d-flex justify-content-between align-items-center">

            <div>

                <button class="btn btn-primary btn-sm" (click)="addItem()">

                    + เพิ่มรายการ

                </button>

                <span class="ms-2 text-danger">

                    จำนวน {{ items.length }} รายการ

                </span>

            </div>

        </div>

    </div>

</div>
