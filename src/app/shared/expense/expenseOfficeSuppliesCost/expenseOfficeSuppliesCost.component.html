
        <div class="expense-table-responsive">

            <table class="table table-bordered align-middle expense-table text-center mb-0">

                <!-- header -->
                <thead class="text-center text-white expense-table-header">

                    <tr>

                        <th width="5%">

                            ลำดับ

                        </th>

                        <th width="25%">

                            รายการ

                        </th>

                        <th width="10%">

                            จำนวน

                        </th>

                        <th width="15%">

                            หน่วยนับ

                        </th>

                        <th width="15%">

                            ราคา/หน่วย (บาท)

                        </th>

                        <th width="15%">

                            รวมค่าใช้จ่าย (บาท)

                        </th>

                        <th width="15%">

                            หมายเหตุ

                        </th>

                        <th width="5%">ลบ</th>

                    </tr>

                </thead>

                <!-- BODY -->
                <tbody>

                    <tr *ngFor="let item of items; let i = index">

                        <!-- index -->
                        <td>

                            {{ i + 1 }}

                        </td>

                        <!-- material -->
                        <td>

                            <!-- type 48 -->
                            <input *ngIf="isTextMode" class="form-control" placeholder="ระบุรายการ"
                                [(ngModel)]="item.materialName" (ngModelChange)="updateDetailItems()">

                            <!-- ปกติ -->
                            <ng-select *ngIf="!isTextMode" [items]="Mas_Expense_Detial_List"
                                bindLabel="Expense_Detial_Name" bindValue="Expense_Detial_Id"
                                [(ngModel)]="item.material" placeholder="--- โปรดเลือก ---" appendTo="body"
                                (change)="onMaterialChange(item, $event, i)">
                            </ng-select>

                            <input *ngIf="!isTextMode && isOtherDetail(item)" class="form-control mt-1"
                                placeholder="ระบุรายการ" [(ngModel)]="item.customMaterialName"
                                (ngModelChange)="updateDetailItems()">

                        </td>

                        <!-- qty -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." placeholder="ระบุจำนวน"
                                inputmode="decimal" class="form-control text-center" [(ngModel)]="item.qty"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- unit -->
                        <td>

                            <ng-select appendTo="body" dropdownPosition="auto" [items]="Mas_Unit_Lists"
                                bindLabel="Unit_Name" bindValue="Unit_Id" [(ngModel)]="item.unitId"
                                name="office_supplies_unit_{{i}}" placeholder="-- เลือกหน่วยนับ --" [clearable]="false"
                                (change)="onUnitChange(item)">
                            </ng-select>

                        </td>

                        <!-- price -->
                        <td>

                            <input [readonly]="!isTextMode && !isOtherDetail(item)" type="text" mask="separator.2" thousandSeparator="," placeholder="ระบุราคา/หน่วย"
                                decimalMarker="." inputmode="decimal" class="form-control text-end"
                                [(ngModel)]="item.price" (ngModelChange)="calculate(i)">

                        </td>

                        <!-- total -->
                        <td class="text-end fw-bold">

                            {{
                            item.total
                            | number:'1.2-2'
                            }}

                        </td>

                        <!-- remark -->
                        <td>

                            <input class="form-control" [(ngModel)]="item.remark" placeholder="ระบุหมายเหตุ"
                                (ngModelChange)="updateDetailItems()">

                        </td>

                        <!-- remove -->
                        <td>

                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">

                                 <i class="bx bx-trash"></i>

                            </button>

                        </td>

                    </tr>

                </tbody>

                <!-- FOOTER -->
                <tfoot>

                    <tr>

                        <td colspan="5" class="text-end fw-bold">

                            รวมทั้งสิ้น

                        </td>

                        <td class="text-end fw-bold text-white">

                            {{
                            grandTotal
                            | number:'1.2-2'
                            }}

                        </td>

                        <td colspan="2"></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <!-- ACTION -->
        <div class="mt-3 d-flex justify-content-between align-items-center">

            <div>

                <button class="btn btn-primary" (click)="addItem()">

                     <i class="bx bx-plus text-black"></i>
                   <span class="text-black"> เพิ่มรายการ</span>

                </button>

                <span class="ms-2 text-danger">

                    จำนวน {{ items.length }} รายการ

                </span>

            </div>

        </div>
