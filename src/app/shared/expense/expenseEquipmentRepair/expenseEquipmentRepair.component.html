

  <div class="expense-table-responsive">

    <table class="table table-bordered align-middle expense-table text-center mb-0">

      <!-- header -->
      <thead class="text-center text-white expense-table-header">

                    <tr>

                        <th width="5%">
                            ลำดับ
                        </th>

                        <th width="40%">
                            รายการ
                        </th>

                        <th width="15%">
                            จำนวน
                        </th>

                        <th width="20%">
                            ราคา/หน่วย
                        </th>

                        <th width="15%">
                            รวมค่าใช้จ่าย
                        </th>

                        <th width="5%">ลบ</th>

                    </tr>

                </thead>

                <!-- body -->
                <tbody>

                    <tr *ngFor="let item of items; let i=index">

                        <!-- no -->
                        <td>

                            {{ i + 1 }}

                        </td>

                        <!-- item -->
                        <td>

                            <input class="form-control" [(ngModel)]="item.name"
                                (ngModelChange)="updateDetailItems()" placeholder="ระบุรายการ">

                        </td>

                        <!-- qty -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control text-end" [(ngModel)]="item.qty"
                                (ngModelChange)="calculate(i)" placeholder="ระบุจำนวน">

                        </td>

                        <!-- price -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control text-end" [(ngModel)]="item.price"
                                placeholder="ระบุราคา" (ngModelChange)="calculate(i)" placeholder="ระบุราคา/หน่วย">

                        </td>

                        <!-- total -->
                        <td class="text-end fw-bold text-black">

                            {{
                            item.total
                            | number:'1.2-2'
                            }}

                        </td>

                        <!-- delete -->
                        <td>

                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">

                                 <i class="bx bx-trash"></i>

                            </button>

                        </td>

                    </tr>

                </tbody>

                <!-- footer -->
                <tfoot>

                    <tr class="expense-table-header">

                        <td colspan="4" class="text-end fw-bold">

                            รวมทั้งสิ้น

                        </td>


                        <!-- total -->
                        <td class="text-end fw-bold">

                            {{
                            grandTotal
                            | number:'1.2-2'
                            }}

                        </td>

                        <td></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <!-- footer action -->
        <div class="mt-3 d-flex justify-content-between align-items-center">

            <div>

                <button class="btn btn-primary" (click)="addItem()">
          <i class="bx bx-plus text-black"></i>
                   <span class="text-black"> เพิ่มรายการ</span>

                </button>

                <span class="ms-2 text-danger">

                    จำนวน {{ items.length }} รายการ

                </span>

            </div>

        </div>
