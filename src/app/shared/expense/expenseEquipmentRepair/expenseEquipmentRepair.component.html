<div class="card shadow-sm">

    <!-- Header -->
    <div class="card-header text-white fw-bold" style="background:#2f4ea1;">

        แบบฟอร์มค่าซ่อมแซมครุภัณฑ์

    </div>

    <!-- body -->
    <div class="card-body bg-light">

        <div class="expense-table-responsive">

            <table class="table table-bordered align-middle expense-table text-center bg-white mb-0">

                <!-- header -->
                <thead class="text-center text-white expense-table-header">

                    <tr>

                        <th width="5%">
                            ลำดับ
                        </th>

                        <th width="40%">
                            รายการ
                        </th>

                        <th width="15%">
                            จำนวน
                        </th>

                        <th width="20%">
                            ราคา/หน่วย
                        </th>

                        <th width="15%">
                            รวม
                        </th>

                        <th width="5%"></th>

                    </tr>

                </thead>

                <!-- body -->
                <tbody>

                    <tr *ngFor="let item of items; let i=index">

                        <!-- no -->
                        <td>

                            {{ i + 1 }}

                        </td>

                        <!-- item -->
                        <td>

                            <input class="form-control form-control-sm" [(ngModel)]="item.name"
                                (ngModelChange)="updateDetailItems()" placeholder="ระบุรายการ">

                        </td>

                        <!-- qty -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="item.qty"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- price -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="item.price"
                                placeholder="ระบุราคา" (ngModelChange)="calculate(i)">

                        </td>

                        <!-- total -->
                        <td class="text-end fw-bold text-primary">

                            {{
                            item.total
                            | number:'1.2-2'
                            }}

                        </td>

                        <!-- delete -->
                        <td>

                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">

                                🗑

                            </button>

                        </td>

                    </tr>

                </tbody>

                <!-- footer -->
                <tfoot>

                    <tr style="background:#2f4ea1; color:white;">

                        <td colspan="2" class="text-end fw-bold">

                            รวมทั้งสิ้น

                        </td>

                        <!-- qty -->
                        <td class="fw-bold">

                            {{ getTotalQty() | number:'1.0-2' }}

                        </td>

                        <td></td>

                        <!-- total -->
                        <td class="text-end fw-bold">

                            {{
                            grandTotal
                            | number:'1.2-2'
                            }}

                        </td>

                        <td></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <!-- footer action -->
        <div class="mt-3 d-flex justify-content-between align-items-center">

            <div>

                <button class="btn btn-primary btn-sm" (click)="addItem()">

                    + เพิ่มรายการ

                </button>

                <span class="ms-2 text-danger">

                    จำนวน {{ items.length }} รายการ

                </span>

            </div>

        </div>

    </div>

</div>
