<div class="card shadow-sm">

    <div class="card-body bg-light">

        <div class="table-responsive">

            <table class="table table-bordered align-middle text-center bg-white mb-0">

                <!-- header -->
                <thead class="table-secondary">

                    <tr>

                        <th width="5%">

                            ลำดับ

                        </th>

                        <th width="30%">

                            รายการ

                        </th>

                        <th width="10%">

                            จำนวน

                        </th>

                        <th width="10%">

                            หน่วยนับ

                        </th>

                        <th width="15%">

                            ราคา/หน่วย (บาท)

                        </th>

                        <th width="15%">

                            รวม (บาท)

                        </th>

                        <th width="15%">

                            หมายเหตุ

                        </th>

                        <th width="5%"></th>

                    </tr>

                </thead>

                <!-- body -->
                <tbody>

                    <tr *ngFor="
                            let item of items;
                            let i = index
                        ">

                        <!-- index -->
                        <td>

                            {{ i + 1 }}

                        </td>

                        <!-- product -->
                        <td>

                            <ng-select [items]="computerOptions" bindLabel="name" [(ngModel)]="item.product"
                                appendTo="body" placeholder="--- วัสดุคอมพิวเตอร์ ---"
                                (ngModelChange)="onSelectProduct(item, i)">

                            </ng-select>

                        </td>

                        <!-- qty -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="item.qty"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- unit -->
                        <td>

                            <select class="form-select form-select-sm" [(ngModel)]="item.unit"
                                (ngModelChange)="updateDetailItems()">

                                <option value="">

                                    --- หน่วย ---

                                </option>

                                <option>

                                    ชิ้น

                                </option>

                                <option>

                                    กล่อง

                                </option>

                                <option>

                                    ชุด

                                </option>

                                <option>

                                    ตัว

                                </option>

                                <option>

                                    เครื่อง

                                </option>

                            </select>

                        </td>

                        <!-- price -->
                        <td>

                            <input type="text" class="form-control form-control-sm text-end"
                                mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal"
                                [(ngModel)]="item.price" (ngModelChange)="calculate(i)">

                        </td>

                        <!-- total -->
                        <td class="text-end fw-bold text-primary">

                            {{
                            item.total
                            | number:'1.2-2'
                            }}

                        </td>

                        <!-- remark -->
                        <td>

                            <input class="form-control form-control-sm" [(ngModel)]="item.remark"
                                (ngModelChange)="updateDetailItems()">

                        </td>

                        <!-- remove -->
                        <td>

                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">

                                🗑

                            </button>

                        </td>

                    </tr>

                </tbody>

                <!-- footer -->
                <tfoot class="table-secondary">

                    <tr>

                        <td colspan="5" class="text-end fw-bold">

                            รวม

                        </td>

                        <td class="text-end fw-bold text-primary">

                            {{
                            grandTotal
                            | number:'1.2-2'
                            }}

                        </td>

                        <td colspan="2"></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <!-- action -->
        <div class="mt-3 d-flex justify-content-between align-items-center">

            <div>

                <button class="btn btn-primary btn-sm" (click)="addItem()">

                    + เพิ่มรายการ

                </button>

                <span class="ms-2 text-danger">

                    จำนวน
                    {{ items.length }}
                    รายการ

                </span>

            </div>

        </div>

    </div>

</div>
