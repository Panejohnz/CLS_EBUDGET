<div class="container-fluid bg-light py-3">

    <div class="card shadow-sm border-0">

        <!-- header -->
        <div class="card-header bg-white border-bottom fw-bold text-primary">
            แบบฟอร์มค่าเช่ารถประจำตำแหน่ง
        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered align-middle text-center">

                    <thead class="table-light">
                        <tr>
                            <th style="width:35%">ชื่อ - นามสกุล</th>
                            <th style="width:20%">ตำแหน่ง</th>
                            <th colspan="3">ค่าเช่ารถ 2569</th>
                            <th></th>
                        </tr>

                        <tr>
                            <th></th>
                            <th></th>
                            <th style="width:10%">จำนวน (คัน)</th>
                            <th style="width:15%">ต่อเดือน</th>
                            <th style="width:15%">ต่อปี</th>
                            <th style="width:5%"></th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr *ngFor="let item of list">

                            <td>
                                <input class="form-control" [(ngModel)]="item.name">
                            </td>

                            <td>
                                <select class="form-select" [(ngModel)]="item.position">
                                    <option value="">-- ตำแหน่งงาน --</option>
                                    <option>ผู้อำนวยการ</option>
                                    <option>รองผู้อำนวยการ</option>
                                </select>
                            </td>

                            <td>
                                <input type="number" class="form-control text-center" [(ngModel)]="item.qty"
                                    (ngModelChange)="calculate(item)">
                            </td>

                            <td>
                                <input type="number" class="form-control text-end" [(ngModel)]="item.rate"
                                    (ngModelChange)="calculate(item)">
                            </td>

                            <td class="fw-bold text-end bg-light">
                                {{item.total | number:'1.2-2'}}
                            </td>

                            <td>
                                <button class="btn btn-sm btn-outline-danger" (click)="remove(item)">
                                    <i class="bx bx-trash"></i>
                                </button>
                            </td>

                        </tr>

                    </tbody>

                    <tfoot class="table-light fw-bold">

                        <tr>
                            <td colspan="2" class="text-end">
                                รวมทั้งสิ้น
                            </td>

                            <td>
                                {{totalQty}}
                            </td>

                            <td class="text-end">
                                {{totalMonth | number}}
                            </td>

                            <td class="text-end text-primary">
                                {{totalYear | number}}
                            </td>

                            <td></td>
                        </tr>

                    </tfoot>

                </table>

            </div>

            <!-- footer action -->

            <div class="d-flex justify-content-between mt-3">

                <div>
                    <button class="btn btn-outline-primary" (click)="add()">
                        + เพิ่มรายการ
                    </button>

                    <span class="text-danger ms-2">
                        จำนวน {{list.length}} รายการ
                    </span>
                </div>

                <!-- <div class="card-footer text-end bg-light">

                    <button class="btn btn-success" (click)="save()">
                        💾 บันทึก
                    </button>
                    <button class="btn btn-light" (click)="closeModal()">
                        ✖ ปิดหน้าต่าง
                    </button>

                </div> -->
            </div>

        </div>

    </div>

</div>
