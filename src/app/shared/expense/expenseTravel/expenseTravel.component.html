<div class="card shadow-sm expense-card">
    <div class="card-body">
        <div *ngFor="let section of sections; let s = index" class="d-flex mb-3">
            <!-- <div class="text-center fw-bold text-white rounded-start d-flex align-items-center justify-content-center"
                style="width:60px; background-color:#556398;">
            </div> -->

            <div class="flex-grow-1 border border-dark  rounded-end p-3">
                <div class="d-flex gap-2 mb-3">
                      <label>{{ s + 1 }}. </label>
                      <input class="form-control" [(ngModel)]="section.description" (ngModelChange)="updateDetailItems()"
                        placeholder="คำอธิบายรายการ เช่น เดินทางไปประชุม เป็นต้น">

                    <button type="button" class="btn btn-sm btn-primary text-nowrap" (click)="addDetail(section)">
                        <i class="bx bx-plus text-black"></i><span class="text-black"> เพิ่มค่าใช้จ่าย</span>
                    </button>

                    <button type="button" class="btn btn-sm btn-danger" (click)="remove(s)">
                        <i class="bx bx-trash"></i>
                    </button>
                </div>

                <div class="expense-table-responsive">
                    <table class="table table-bordered align-middle text-center expense-table mb-0"
                        style="table-layout: fixed;">
                        <thead class="text-center text-white expense-table-header">
                            <tr>
                                <th style="width:220px">

                                    ระดับ
                                </th>
                                <th style="width:260px">รายการค่าใช้จ่าย</th>
                                <th style="width:110px">ครั้ง</th>
                                <th style="width:130px">จำนวนคน</th>
                                <th style="width:180px">จำนวนวัน/คืน/เที่ยว</th>
                                <th style="width:160px">อัตรา/วัน (บาท)</th>
                                <th style="width:170px">รวมทั้งสิ้น (บาท)</th>
                                <th style="width:60px">ลบ</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr *ngFor="let detail of section.details; let i = index">
                                <td>
                                    <ng-select appendTo="body" dropdownPosition="auto" [items]="Mas_Business_Level"
                                        bindLabel="Level_Name" bindValue="Level_Id" [(ngModel)]="detail.level"
                                        name="travel_level_{{s}}_{{i}}" placeholder="-- เลือกระดับ --"
                                        [clearable]="false" (change)="onLevelChange(detail)">
                                    </ng-select>
                                </td>

                                <td>
                                    <ng-select appendTo="body" dropdownPosition="auto"
                                        [items]="detail.expenseDetails || []"
                                        bindLabel="Expense_Detial_Name" bindValue="Expense_Detial_Id"
                                        [(ngModel)]="detail.pairId" name="travel_expense_detail_{{s}}_{{i}}"
                                        placeholder="-- เลือกรายการค่าใช้จ่าย --" [clearable]="false"
                                        [disabled]="!detail.level" (change)="onExpenseDetailChange(detail)">
                                    </ng-select>
                                </td>

                                <td>
                                    <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="."
                                        inputmode="decimal" class="form-control text-center" [(ngModel)]="detail.times" placeholder="ระบุจำนวนครั้ง"
                                        (ngModelChange)="updateDetailItems()">
                                </td>

                                <td>
                                    <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." placeholder="ระบุจำนวนคน"
                                        inputmode="decimal" class="form-control text-center"
                                        [(ngModel)]="detail.peopleCount" (ngModelChange)="calculate(detail)">
                                </td>

                                <td>
                                    <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." placeholder="ระบุจำนวนวัน/คืน/เที่ยว"
                                        inputmode="decimal" class="form-control text-center"
                                        [(ngModel)]="detail.dayCount" (ngModelChange)="calculate(detail)">
                                </td>

                                <td>
                                    <input type="text" class="form-control text-end" mask="separator.2" placeholder="ระบุอัตรา"
                                        thousandSeparator="," decimalMarker="." inputmode="decimal"
                                        [readonly]="!detail.isOtherRate"
                                        [class.bg-light]="!detail.isOtherRate"
                                        [(ngModel)]="detail.rate" (ngModelChange)="calculate(detail)">
                                </td>

                                <td class="fw-bold text-end">
                                    {{ detail.total | number:'1.2-2' }}
                                </td>

                                <td>
                                    <button type="button" class="btn btn-sm btn-danger"
                                        (click)="removeDetail(section, i)">
                                        <i class="bx bx-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>

                        <tfoot>
                            <tr>
                                <td colspan="6" class="text-end">รวมทั้งสิ้น</td>
                                <td class="fw-bold text-end">
                                    {{ getSectionTotal(section) | number:'1.2-2' }}
                                </td>
                                <td></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>

        <button type="button" class="btn btn-primary" (click)="addSection()">
                     <i class="bx bx-plus text-black"></i><span class="text-black"> เพิ่มรายการ</span>
        </button>
    </div>
</div>
