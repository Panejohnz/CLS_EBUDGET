
                <div class="expense-table-responsive">

                        <table class="table table-bordered align-middle expense-table text-center bg-white mb-0"
                                style="table-layout: fixed;">

                                <!-- HEADER -->
                                <thead class="text-center text-white expense-table-header">

                                        <tr>

                                                <th rowspan="2" style="width:14%">

                                                        ระดับ

                                                </th>

                                                <th rowspan="2" style="width:28%">

                                                        รายการค่าใช้จ่าย

                                                </th>
                                                <th rowspan="2" style="width:8%">

                                                        คดี

                                                </th>
                                                <th colspan="3" style="width:24%">

                                                        ประมาณการค่าใช้จ่าย

                                                </th>

                                                <th rowspan="2" style="width:11%">

                                                        ค่าใช้จ่ายต่อคดี

                                                </th>

                                                <th rowspan="2" style="width:11%">

                                                        รวมทั้งสิ้น

                                                </th>

                                        </tr>

                                        <tr>
                                                <th style="width:8%">

                                                        คน

                                                </th>

                                                <th style="width:8%">

                                                        วัน

                                                </th>
                                                 <th style="width:12%">

                                                        อัตรา

                                                </th>

                                        </tr>

                                </thead>

                                <!-- BODY -->
                                <tbody>

                                        <!-- MAIN
                                        <tr class="bg-light fw-bold">

                                                <td></td>

                                                <td class="text-start">

                                                        ค่าใช้จ่ายตามมาตรา 61

                                                </td>

                                                <td colspan="4"></td> -->

                                        <!-- cost per case -->
                                        <!-- <td class="text-end">

                                                        {{
                                                        main.costPerCase
                                                        | number:'1.2-2'
                                                        }}

                                                </td> -->

                                        <!-- total -->
                                        <!-- <td class="text-end text-primary">

                                                        {{
                                                        main.total
                                                        | number:'1.2-2'
                                                        }}

                                                </td>

                                        </tr> -->

                                        <!-- LOOP -->
                                        <tr *ngFor="let group of caseList">

                                                <!-- size -->
                                                <td>

                                                        <select class="form-select" [(ngModel)]="group.name"
                                                                (change)="onCaseSizeChange(group)">

                                                                <option value="">

                                                                        -- เลือกระดับ --

                                                                </option>

                                                                <option *ngFor="let size of caseSizeOptions"
                                                                        [ngValue]="size">

                                                                        {{ size }}

                                                                </option>

                                                        </select>

                                                </td>

                                                <!-- รายการ -->
                                                <td class="text-start">

                                                        <!-- item -->
                                                        <div *ngIf="group.items[0] as item" class="d-flex gap-2 mt-1">

                                                                <!-- dropdown -->
                                                                <select class="form-select"
                                                                        [(ngModel)]="item.expenseDetailId"
                                                                        [disabled]="!group.name"
                                                                        (change)="onTypeChange(item, group)">

                                                                        <option value="">

                                                                                {{ group.name ? '-- เลือกค่าใช้จ่าย --'
                                                                                : '-- เลือกระดับก่อน --' }}

                                                                        </option>

                                                                        <option *ngFor="let option of getExpenseOptions(group)"
                                                                                [ngValue]="getExpenseDetailOptionId(option)">

                                                                                {{ option.Expense_Detial_Name }}

                                                                        </option>

                                                                </select>

                                                                <!-- other -->
                                                                <input *ngIf="isOtherExpenseDetail(item)" type="text"
                                                                        class="form-control" placeholder="ระบุรายการ"
                                                                        [(ngModel)]="item.customName"
                                                                        (ngModelChange)="updateDetailItems()">

                                                        </div>

                                                </td>

                                                <!-- case -->
                                                <td>

                                                        <input type="text" mask="separator.2" thousandSeparator=","
                                                                decimalMarker="." inputmode="decimal"
                                                                class="form-control text-center" [(ngModel)]="group.case"
                                                                (ngModelChange)="calculate(group)">

                                                </td>

                                                <!-- people -->
                                                <td>

                                                        <input type="text" mask="separator.2" thousandSeparator=","
                                                                decimalMarker="." inputmode="decimal"
                                                                class="form-control text-center" [(ngModel)]="group.person"
                                                                (ngModelChange)="calculate(group)">

                                                </td>

                                                <!-- day -->
                                                <td>

                                                        <input type="text" mask="separator.2" thousandSeparator=","
                                                                decimalMarker="." inputmode="decimal"
                                                                class="form-control text-center" [(ngModel)]="group.day"
                                                                (ngModelChange)="calculate(group)">

                                                </td>

                                                <!-- rate -->
                                                <td class="text-end">

                                                        <div *ngIf="group.items[0] as item" class="mt-1">

                                                                <input *ngIf="isOtherExpenseDetail(item)" type="text"
                                                                        mask="separator.2" thousandSeparator=","
                                                                        decimalMarker="." inputmode="decimal"
                                                                        class="form-control  text-end"
                                                                        placeholder="ราคา" [(ngModel)]="item.amount"
                                                                        (ngModelChange)="calculate(group)">

                                                                <div *ngIf="!isOtherExpenseDetail(item)"
                                                                        class="form-control  text-end bg-light">

                                                                        {{
                                                                        item.amount
                                                                        | number:'1.2-2'
                                                                        }}

                                                                </div>

                                                        </div>

                                                </td>

                                                <!-- cost -->
                                                <td class="text-end fw-bold">

                                                        {{
                                                        group.costPerCase
                                                        | number:'1.2-2'
                                                        }}

                                                </td>

                                                <!-- total -->
                                                <td class="text-end fw-bold text-black">

                                                        {{
                                                        group.total
                                                        | number:'1.2-2'
                                                        }}

                                                </td>

                                        </tr>

                                </tbody>

                                <!-- FOOTER -->
                                <tfoot>

                                        <tr class="fw-bold">

                                                <td colspan="7" class="text-end">

                                                        รวมทั้งสิ้น

                                                </td>

                                                <td class="text-end">

                                                        {{
                                                        main.total
                                                        | number:'1.2-2'
                                                        }}

                                                </td>

                                        </tr>

                                </tfoot>

                        </table>

                </div>



                  <!-- bottom -->
        <div class="mt-3 d-flex justify-content-between align-items-center">

            <div>

                <button class="btn btn-primary" (click)="addGroup()">

                           <i class="bx bx-plus text-black"></i>
                   <span class="text-black"> เพิ่มรายการ</span>

                </button>


            </div>

        </div>
