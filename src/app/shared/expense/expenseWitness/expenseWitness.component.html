<div class="card shadow-sm">

    <div class="card-body bg-light">

        <div class="expense-table-responsive">

            <table class="table table-bordered align-middle expense-table text-center bg-white mb-0">

                <!-- HEADER -->
                <thead class="text-center text-white expense-table-header">

                    <tr>

                        <th rowspan="2" width="25%">

                            รายการ

                        </th>

                        <th colspan="3">

                            ประมาณการค่าใช้จ่าย ปี 2570

                        </th>

                        <th rowspan="2">

                            ค่าใช้จ่ายต่อคดี (บาท)

                        </th>

                        <th rowspan="2">

                            รวมทั้งสิ้น (บาท)

                        </th>

                    </tr>

                    <tr>

                        <th>
                            คดี
                        </th>

                        <th>
                            คน
                        </th>

                        <th>
                            ค่าตอบแทน
                        </th>

                    </tr>

                </thead>

                <!-- BODY -->
                <tbody>

                    <tr *ngFor="let row of list">

                        <!-- รายการ -->
                        <td class="text-start">

                            <!-- parent -->
                            <span *ngIf="row.level === 0" class="fw-semibold">

                                {{ row.name }}

                            </span>

                            <!-- child -->
                            <span *ngIf="row.level === 1" class="ps-4">

                                - {{ row.name }}

                            </span>

                        </td>

                        <!-- case -->
                        <td>

                            <input *ngIf="!row.children" type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end"
                                [(ngModel)]="row.case" (ngModelChange)="calculate()">

                        </td>

                        <!-- people -->
                        <td>

                            <input *ngIf="!row.children" type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end"
                                [(ngModel)]="row.person" (ngModelChange)="calculate()">

                        </td>

                        <!-- rate -->
                        <td>

                            <input *ngIf="!row.children" type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end"
                                [(ngModel)]="row.rate" readonly>

                        </td>

                        <!-- cost -->
                        <td class="text-end fw-bold">

                            {{
                            getCost(row)
                            | number:'1.2-2'
                            }}

                        </td>

                        <!-- total -->
                        <td class="text-end fw-bold text-primary">

                            {{
                            getTotal(row)
                            | number:'1.2-2'
                            }}

                        </td>

                    </tr>

                </tbody>

                <!-- FOOTER -->
                <tfoot>

                    <tr class="fw-bold">

                        <td colspan="5" class="text-end">

                            รวมทั้งสิ้น

                        </td>

                        <td class="text-end">

                            {{
                            getTotal(list[0])
                            | number:'1.2-2'
                            }}

                        </td>

                    </tr>

                </tfoot>

            </table>

        </div>

    </div>

</div>
