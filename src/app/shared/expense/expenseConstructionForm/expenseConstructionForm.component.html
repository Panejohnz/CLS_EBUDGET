<div class="card shadow-sm">



    <div class="card-body">

        <div class="table-responsive">
            <table class="table table-bordered align-middle text-center">

                <thead class="table-secondary">
                    <tr>
                        <th rowspan="2">ลำดับ</th>
                        <th rowspan="2">รายการ</th>
                        <th rowspan="2">ระยะเวลา (ปี)</th>
                        <th rowspan="2">ราคา/หน่วย</th>
                        <th rowspan="2">จำนวน</th>
                        <th rowspan="2">วงเงินรวม</th>
                        <th colspan="2">เหตุผล</th>
                        <th rowspan="2"></th>
                    </tr>
                    <tr>
                        <th>สร้างใหม่</th>
                        <th>ปรับปรุง</th>
                    </tr>
                </thead>

                <tbody>
                    <tr *ngFor="let item of items; let i=index">

                        <td>{{i+1}}</td>

                        <td>
                            <input class="form-control form-control-sm" [(ngModel)]="item.name">
                        </td>

                        <td>
                            <input type="number" class="form-control form-control-sm text-center"
                                [(ngModel)]="item.year">
                        </td>

                        <!-- ราคา -->
                        <td>
                            <input type="number" class="form-control form-control-sm text-end" [(ngModel)]="item.price"
                                (ngModelChange)="calculate(i)">
                        </td>

                        <!-- จำนวน -->
                        <td>
                            <input type="number" class="form-control form-control-sm text-end" [(ngModel)]="item.qty"
                                (ngModelChange)="calculate(i)">
                        </td>

                        <!-- รวม -->
                        <td class="text-end fw-bold">
                            {{item.total | number:'1.2-2'}}
                        </td>

                        <!-- สร้างใหม่ -->
                        <td>
                            <input type="number" class="form-control form-control-sm" [(ngModel)]="item.newQty">
                        </td>

                        <!-- ปรับปรุง -->
                        <td>
                            <input type="number" class="form-control form-control-sm" [(ngModel)]="item.updateQty">
                        </td>

                        <td>
                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">🗑</button>
                        </td>

                    </tr>
                </tbody>

                <tfoot class="table-secondary">
                    <tr>
                        <td colspan="5" class="text-end fw-bold">รวม</td>
                        <td class="text-end fw-bold">
                            {{grandTotal | number:'1.2-2'}}
                        </td>
                        <td colspan="3"></td>
                    </tr>
                </tfoot>

            </table>
        </div>

        <!--  checkbox -->
        <div class="mt-3" *ngIf="expenseItem.Expense_Id == 65">
            <label class="fw-semibold me-3">ประเภทผูกพัน</label>

            <input type="checkbox" [(ngModel)]="isOld"> ผูกพันเดิม
            <input type="checkbox" class="ms-3" [(ngModel)]="isNew"> ผูกพันใหม่
        </div>

        <!--  radio ปี -->
        <div class="mt-3">
            <label class="fw-semibold">ระยะผูกพัน</label>

            <div class="mt-2">
                <label *ngFor="let y of [1,2,3,4,5]" class="me-3">
                    <input type="radio" name="year" [value]="y" [(ngModel)]="bindingYear" (change)="onYearChange()">
                    {{y}} ปี
                </label>
            </div>
        </div>

        <!--  กระจายเงิน -->
        <div class="mt-3" *ngIf="bindingYear">

            <label class="fw-semibold">กระจายเงิน / งวดงาน</label>

            <div class="row mt-2" *ngFor="let y of yearly; let i=index">

                <div class="col-md-2">
                    ปีที่ {{i+1}}
                </div>

                <div class="col-md-5">
                    <input type="number" class="form-control form-control-sm" [(ngModel)]="yearly[i].amount"
                        placeholder="จำนวนเงิน">
                </div>

                <div class="col-md-5">
                    <input class="form-control form-control-sm" [(ngModel)]="yearly[i].milestone" placeholder="จำนวนงวด">
                </div>

            </div>

        </div>

        <div class="mt-3">
            <label class="fw-semibold">คุณสมบัติ (spec)</label>
            <textarea class="form-control" rows="4" [(ngModel)]="spec"></textarea>
        </div>

        <div class="mt-3">

            <label class="fw-semibold">แนบไฟล์</label>

            <div class="row mt-2">

                <div class="col-md-6" *ngFor="let f of fileConfig">

                    <label>{{f.label}} <span *ngIf="f.required" class="text-danger">*</span></label>

                    <input type="file" class="form-control form-control-sm" (change)="uploadFile($event, f.key)">

                    <small class="text-success" *ngIf="files[f.key]">
                        📎 {{files[f.key]?.name}}
                    </small>

                </div>

            </div>

        </div>

        <!-- ปุ่ม -->
        <div class="mt-3">
            <button class="btn btn-primary btn-sm" (click)="addItem()">
                + เพิ่มรายการ
            </button>
        </div>

    </div>

    <!-- <div class="card-footer text-end">
        <button class="btn btn-success" (click)="save()">💾 บันทึก</button>
        <button class="btn btn-danger">✖ ปิดหน้าต่าง</button>
    </div> -->

</div>
