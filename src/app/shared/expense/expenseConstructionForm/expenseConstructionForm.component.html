<div class="card shadow-sm">

    <div class="card-body">

        <!-- TABLE -->
        <div class="table-responsive">

            <table class="table table-bordered align-middle text-center">

                <thead class="table-secondary">

                    <tr>

                        <th rowspan="2" width="5%">
                            ลำดับ
                        </th>

                        <th rowspan="2" width="20%">
                            รายการ
                        </th>

                        <th rowspan="2" width="10%">
                            ระยะเวลา (ปี)
                        </th>

                        <th rowspan="2" width="15%">
                            ราคา/หน่วย
                        </th>

                        <th rowspan="2" width="15%">
                            จำนวน
                        </th>

                        <th rowspan="2" width="10%">
                            วงเงินรวม
                        </th>

                        <th colspan="2" width="20%">
                            เหตุผล
                        </th>

                        <th rowspan="2" width="5%"></th>

                    </tr>

                    <tr>

                        <th>
                            สร้างใหม่
                        </th>

                        <th>
                            ปรับปรุง
                        </th>

                    </tr>

                </thead>

                <tbody>

                    <tr *ngFor="let item of items; let i=index">

                        <!-- index -->
                        <td>
                            {{i+1}}
                        </td>

                        <!-- รายการ -->
                        <td>

                            <input class="form-control form-control-sm" [(ngModel)]="item.name"
                                (ngModelChange)="updateDetailItems()">

                        </td>

                        <!-- ระยะเวลา -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-center"
                                [(ngModel)]="item.year" (ngModelChange)="updateDetailItems()">

                        </td>

                        <!-- ราคา -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="item.price"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- จำนวน -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="item.qty"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- รวม -->
                        <td class="text-end fw-bold text-primary">

                            {{item.total | number:'1.2-2'}}

                        </td>

                        <!-- สร้างใหม่ -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="item.newQty"
                                (ngModelChange)="updateDetailItems()">

                        </td>

                        <!-- ปรับปรุง -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end"
                                [(ngModel)]="item.updateQty" (ngModelChange)="updateDetailItems()">

                        </td>

                        <!-- delete -->
                        <td>

                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">

                                🗑

                            </button>

                        </td>

                    </tr>

                </tbody>

                <!-- FOOTER -->
                <tfoot class="table-secondary">

                    <tr>

                        <td colspan="5" class="text-end fw-bold">
                            รวม
                        </td>

                        <td class="text-end fw-bold text-primary">

                            {{grandTotal | number:'1.2-2'}}

                        </td>

                        <td colspan="3"></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <!-- TYPE -->
        <div class="mt-4" *ngIf="expenseItem?.Expense_Id == 65">

            <label class="fw-semibold me-3">
                ประเภทผูกพัน
            </label>

            <label class="me-3">

                <input type="checkbox" [(ngModel)]="isOld" (ngModelChange)="updateDetailItems()">

                ผูกพันเดิม

            </label>

            <label>

                <input type="checkbox" [(ngModel)]="isNew" (ngModelChange)="updateDetailItems()">

                ผูกพันใหม่

            </label>

        </div>

        <!-- BINDING YEAR -->
        <div class="mt-4">

            <label class="fw-semibold">
                ระยะผูกพัน
            </label>

            <div class="mt-2">

                <label *ngFor="let y of [1,2,3,4,5]" class="me-3">

                    <input type="radio" name="bindingYear" [value]="y" [(ngModel)]="bindingYear"
                        (change)="onYearChange()">

                    {{y}} ปี

                </label>

            </div>

        </div>

        <!-- YEARLY -->
        <div class="mt-4" *ngIf="bindingYear">

            <label class="fw-semibold">
                กระจายเงิน / งวดงาน
            </label>

            <div class="row mt-2 align-items-center" *ngFor="let y of yearly; let i=index">

                <div class="col-md-2">

                    ปีที่ {{i+1}}

                </div>

                <!-- amount -->
                <div class="col-md-5">

                    <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="yearly[i].amount"
                        (ngModelChange)="updateDetailItems()" placeholder="จำนวนเงิน">

                </div>

                <!-- milestone -->
                <div class="col-md-5">

                    <input class="form-control form-control-sm" [(ngModel)]="yearly[i].milestone"
                        (ngModelChange)="updateDetailItems()" placeholder="จำนวนงวด">

                </div>

            </div>

        </div>

        <!-- SPEC -->
        <div class="mt-4">

            <label class="fw-semibold">
                คุณสมบัติ (spec)
            </label>

            <textarea rows="4" class="form-control" [(ngModel)]="spec" (ngModelChange)="updateDetailItems()">

            </textarea>

        </div>

        <!-- FILE -->
        <div class="mt-4">

            <label class="fw-semibold">
                แนบไฟล์
            </label>

            <div class="row mt-2">

                <div class="col-md-6 mb-3" *ngFor="let f of fileConfig">

                    <label class="mb-1">

                        {{f.label}}

                        <span *ngIf="f.required" class="text-danger">

                            *

                        </span>

                    </label>

                    <input type="file" class="form-control form-control-sm" (change)="uploadFile($event, f.key)">

                    <small class="text-success" *ngIf="files[f.key]">

                        📎 {{files[f.key]?.name}}

                    </small>

                </div>

            </div>

        </div>

        <!-- BUTTON -->
        <div class="mt-4 d-flex justify-content-between align-items-center">

            <div>

                <button class="btn btn-primary btn-sm" (click)="addItem()">

                    + เพิ่มรายการ

                </button>

                <span class="ms-2 text-danger">

                    จำนวน {{items.length}} รายการ

                </span>

            </div>

        </div>

    </div>

</div>
