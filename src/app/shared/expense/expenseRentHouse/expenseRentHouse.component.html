<div class="card">

    <div class="card-header bg-light  fw-bold">
        แบบฟอร์มค่าเช่าบ้าน
    </div>

    <div class="card-body">

        <div class="table-responsive">

            <table class="table table-bordered align-middle text-center">

                <thead class="table-light">

                    <tr>

                        <th style="width:5%">ลำดับ</th>

                        <th style="width:35%">
                            หน่วยงาน
                        </th>

                        <th style="width:15%">
                            จำนวนคน
                        </th>

                        <th style="width:20%">
                            ต่อ/ปี
                        </th>

                        <th style="width:5%"></th>

                    </tr>

                </thead>

                <tbody>

                    <tr *ngFor="let item of rentList; let i = index">

                        <td>{{i+1}}</td>

                        <td>

                            <select class="form-select" [(ngModel)]="item.department">

                                <option [ngValue]="null">
                                    -- เลือกหน่วยงาน --
                                </option>

                                <option *ngFor="let item of model.Budget_Request_Detail_Item" [ngValue]="item">

                                    {{item.name}}

                                </option>

                            </select>

                        </td>

                        <td>

                            <input type="number" class="form-control text-center" [(ngModel)]="item.qty"
                                (ngModelChange)="calculateTotal()">

                        </td>

                        <td>

                            <input type="number" class="form-control text-end" [(ngModel)]="item.amount"
                                (ngModelChange)="calculateTotal()">

                        </td>

                        <td>

                            <button class="btn btn-sm btn-danger" (click)="removeRow(i)">

                                <i class="bx bx-trash"></i>

                            </button>

                        </td>

                    </tr>

                </tbody>

                <tfoot class="bg-light  fw-bold">

                    <tr>

                        <td colspan="2" class="text-end">
                            รวมทั้งสิ้น
                        </td>

                        <td>
                            {{totalQty}}
                        </td>

                        <td class="text-end">
                            {{totalAmount | number:'1.2-2'}}
                        </td>

                        <td></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <div class="mt-2">

            <button class="btn btn-primary" (click)="addRow()">

                <i class="bx bx-plus"></i>
                เพิ่มรายการ

            </button>

            <span class="ms-3 text-danger">
                จำนวน {{rentList.length}} รายการ
            </span>

        </div>

        <hr>

        <!-- แนบไฟล์ -->

        <div class="mt-3">

            <label class="fw-bold">

                แนบไฟล์ <span class="text-danger">*</span>

            </label>

            <input type="file" class="form-control" (change)="onFileChange($event)" required>

            <small class="text-danger" *ngIf="!file">
                กรุณาแนบไฟล์
            </small>

        </div>

    </div>

    <!-- <div class="card-footer text-end">

        <button class="btn btn-primary" (click)="save()" [disabled]="!file">

            <i class="bx bx-save"></i>
            บันทึก

        </button>

        <button class="btn btn-light" (click)="closeModal()">

            ✖ ปิดหน้าต่าง

        </button>

    </div> -->

</div>
