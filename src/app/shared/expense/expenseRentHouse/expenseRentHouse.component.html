<style>
    .ng-dropdown-panel {
        z-index: 99999 !important;
    }
</style>

<div class="expense-table-responsive">
    <table class="table table-bordered align-middle text-center expense-table mb-0" style="table-layout: fixed;">
        <thead class="text-center text-white expense-table-header">

            <tr>

                <th style="width:5%">ลำดับ</th>

                <th style="width:35%">
                    หน่วยงาน
                </th>

                <th style="width:15%">
                    จำนวนคน
                </th>

                <th style="width:20%">
                    ต่อ/ปี
                </th>

                <th style="width:5%">ลบ</th>

            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let item of model.Budget_Request_Detail_Item; let i = index">

                <td>{{i+1}}</td>

                <td>

                    <ng-select [items]="department" bindLabel="Department_Name" bindValue="Department_Id"
                        [(ngModel)]="item.Department_Id" appendTo="body" placeholder="-- เลือกหน่วยงาน --">

                    </ng-select>
                </td>

                <td>

                    <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal"
                        class="form-control text-center" [(ngModel)]="item.People" (ngModelChange)="calculateTotal()">

                </td>

                <td>

                    <input type="text" class="form-control text-end" mask="separator.2" thousandSeparator=","
                        decimalMarker="." inputmode="decimal" [(ngModel)]="item.Per_Year"
                        (ngModelChange)="onPerYearChange($event, item)">

                </td>

                <td>

                    <button class="btn btn-sm btn-danger" (click)="removeRow(i)">

                        <i class="bx bx-trash"></i>

                    </button>

                </td>

            </tr>

        </tbody>

        <tfoot class="bg-light  fw-bold">

            <tr>

                <td colspan="2" class="text-end">
                    รวมทั้งสิ้น
                </td>

                <td>
                    {{totalQty | number:'1.0-2'}}
                </td>

                <td class="text-end">
                    {{totalAmount | number:'1.2-2'}}
                </td>

                <td></td>

            </tr>

        </tfoot>

    </table>

</div>

<div class="mt-2">

    <button class="btn btn-primary" (click)="addRow()">

        <i class="bx bx-plus text-black"></i>
        <span class="text-black">เพิ่มรายการ</span>

    </button>

    <span class="ms-3 text-danger">
        จำนวน {{model.Budget_Request_Detail_Item.length}} รายการ
    </span>

</div>

<hr>
