<div class="card shadow-sm">

    <div class="card-header bg-light fw-bold">
        แบบฟอร์มเงินอุดหนุน
    </div>

    <div class="card-body bg-light">

        <div class="table-responsive">

            <table class="table table-bordered align-middle text-center bg-white">

                <thead class="table-secondary">

                    <tr>

                        <th width="5%">
                            ลำดับ
                        </th>

                        <th width="40%">
                            รายการ
                        </th>

                        <th width="10%">
                            จำนวนเงิน
                        </th>

                        <th width="10%">
                            จำนวน
                        </th>

                        <th width="10%">
                            หน่วยนับ
                        </th>

                        <th width="10%">
                            จำนวนเดือน
                        </th>

                        <th width="10%">
                            รวมทั้งสิ้น
                        </th>

                        <th width="5%"></th>

                    </tr>

                </thead>

                <tbody>

                    <tr *ngFor="let item of items; let i=index">

                        <!-- index -->
                        <td>
                            {{i+1}}
                        </td>

                        <!-- รายการ -->
                        <td>

                            <input class="form-control form-control-sm" [(ngModel)]="item.name"
                                (ngModelChange)="updateDetailItems()">

                        </td>

                        <!-- จำนวนเงิน -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="item.price"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- จำนวน -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="item.qty"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- หน่วย -->
                        <td>

                            <select class="form-select form-select-sm" [(ngModel)]="item.unit"
                                (ngModelChange)="updateDetailItems()">

                                <option value="คน">คน</option>
                                <option value="งาน">งาน</option>
                                <option value="ครั้ง">ครั้ง</option>
                                <option value="โครงการ">โครงการ</option>

                            </select>

                        </td>

                        <!-- เดือน -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" class="form-control form-control-sm text-end" [(ngModel)]="item.month"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- รวม -->
                        <td class="text-end fw-bold text-primary">

                            {{item.total | number:'1.2-2'}}

                        </td>

                        <!-- delete -->
                        <td>

                            <button class="btn btn-outline-danger btn-sm" (click)="removeItem(i)">

                                🗑

                            </button>

                        </td>

                    </tr>

                </tbody>

                <!-- footer -->
                <tfoot class="table-primary fw-bold">

                    <tr>

                        <td colspan="3" class="text-end">
                            รวมทั้งสิ้น
                        </td>

                        <td>
                            {{getTotalQty() | number:'1.0-2'}}
                        </td>

                        <td></td>

                        <td>
                            {{getTotalMonth() | number:'1.0-2'}}
                        </td>

                        <td class="text-end text-primary">
                            {{grandTotal | number:'1.2-2'}}
                        </td>

                        <td></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <!-- bottom -->
        <div class="mt-3 d-flex justify-content-between align-items-center">

            <div>

                <button class="btn btn-primary btn-sm" (click)="addItem()">

                    + เพิ่มรายการ

                </button>

                <span class="ms-2 text-danger">
                    จำนวน {{items.length}} รายการ
                </span>

            </div>

        </div>

    </div>

</div>
