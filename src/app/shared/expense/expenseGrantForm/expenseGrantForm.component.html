
<div class="expense-table-responsive">

    <table class="table table-bordered align-middle expense-table text-center mb-0">

        <!-- header -->
        <thead class="text-center text-white expense-table-header">

                    <tr>

                        <th width="5%">
                            ลำดับ
                        </th>

                        <th width="40%">
                            รายการ
                        </th>

                     
                        <th width="10%">
                            จำนวน
                        </th>

                        <th width="10%">
                            หน่วยนับ
                        </th>

                        <th width="10%">
                            จำนวนเดือน
                        </th>
                           <th width="10%">
                            อัตราค่าใช้จ่าย
                        </th>


                        <th width="10%">
                            รวมทั้งสิ้น
                        </th>

                        <th width="5%"></th>

                    </tr>

                </thead>

                <tbody>

                    <tr *ngFor="let item of items; let i=index">

                        <!-- index -->
                        <td>
                            {{i+1}}
                        </td>

                        <!-- รายการ -->
                        <td>

                            <input class="form-control" [(ngModel)]="item.name" placeholder="ระบุรายการ" 
                                (ngModelChange)="updateDetailItems()">

                        </td>


                        <!-- จำนวน -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" placeholder="ระบุจำนวน" 
                            class="form-control text-center" [(ngModel)]="item.qty"  (ngModelChange)="calculate(i)">

                        </td>

                        <!-- หน่วย -->
                        <td>

                            <select class="form-select" [(ngModel)]="item.unit"
                                (ngModelChange)="updateDetailItems()">

                                <option value="คน">คน</option>
                                <option value="งาน">งาน</option>
                                <option value="ครั้ง">ครั้ง</option>
                                <option value="โครงการ">โครงการ</option>

                            </select>

                        </td>

                        <!-- เดือน -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" placeholder="ระบุเดือน" 
                            class="form-control text-center" [(ngModel)]="item.month"
                                (ngModelChange)="calculate(i)">

                        </td>

                        <!-- จำนวนเงิน -->
                        <td>

                            <input type="text" mask="separator.2" thousandSeparator="," decimalMarker="." inputmode="decimal" placeholder="ระบุอัตราค่าใช้จ่าย"  
                            class="form-control  text-end" [(ngModel)]="item.price"
                                (ngModelChange)="calculate(i)">

                        </td>
                        <!-- รวม -->
                        <td class="text-end fw-bold text-black">

                            {{item.total | number:'1.2-2'}}

                        </td>

                        <!-- delete -->
                        <td>

                            <button class="btn btn-danger btn-sm" (click)="removeItem(i)">

                                    <i class="bx bx-trash"></i>

                            </button>

                        </td>

                    </tr>

                </tbody>

                <!-- footer -->
                <tfoot class="bg-light  fw-bold">

                    <tr>

                        <td colspan="6" class="text-end">
                            รวมทั้งสิ้น
                        </td>



                        <td class="text-end text-white fw-bold">
                            {{grandTotal | number:'1.2-2'}}
                        </td>

                        <td></td>

                    </tr>

                </tfoot>

            </table>

        </div>

        <!-- bottom -->
        <div class="mt-3 d-flex justify-content-between align-items-center">

            <div>

                <button class="btn btn-primary" (click)="addItem()">

                           <i class="bx bx-plus text-black"></i>
                   <span class="text-black"> เพิ่มรายการ</span>

                </button>

                <span class="ms-2 text-danger">
                    จำนวน {{items.length}} รายการ
                </span>

            </div>

        </div>
