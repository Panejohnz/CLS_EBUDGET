<div class="border rounded p-3 bg-light">
    <div class="row g-3">

        <div class="col-md-6">
            <label class="form-label">หน่วยงาน</label>
            <select (change)="Onchange_type_Department()" class="form-select" [(ngModel)]="model.selectedDepartment">
                <option [ngValue]="null" disabled>-- เลือกหน่วยงาน --</option>

                <option *ngFor="let item of Mas_Department_Lists" [ngValue]="item">
                    {{ item.Department_Name }}
                </option>
            </select>
        </div>

        <div class="col-md-6" *ngIf="model">
            <label class="form-label">ประเภทโครงการ</label>

            <select (change)="Onchange_type()" class="form-select" name="projectType" [(ngModel)]="model.projectType">
                <option [ngValue]="null" disabled >-- เลือกประเภทโครงการ --</option>
                <option *ngFor="let item of Mas_Expense_Lists" [ngValue]="item">
                    {{ item.Expense_Name }}
                </option>
            </select>
        </div>

        <div class="col-md-6">
            <label class="form-label">แผนงาน</label>
            <select (change)="Onchange_type_Plan()" class="form-select" [(ngModel)]="model.selectedPlan">
                <option [ngValue]="null" disabled selected>-- เลือกแผนงาน --</option>
                <option *ngFor="let item of Mas_Plan_Lists" [ngValue]="item">
                    {{ item.Plan_Name }}
                </option>
            </select>
        </div>

        <div class="col-md-6">
            <label class="form-label">ผลผลิต</label>
            <select (change)="Onchange_type_Product()" class="form-select" [(ngModel)]="model.selectedProduct">
                <option [ngValue]="null" disabled selected>-- เลือกผลผลิต --</option>
                <option *ngFor="let item of Mas_Product" [ngValue]="item">
                    {{ item.Product_Name }}
                </option>
            </select>
        </div>

        <div class="col-md-6">
            <label class="form-label">กิจกรรม</label>
            <select (ngModelChange)="onActivityChange($event)" class="form-select" [(ngModel)]="model.selectedActivity">
                <option [ngValue]="null" disabled selected>-- เลือกกิจกรรม --</option>
                <option *ngFor="let item of Mas_Activity" [ngValue]="item">
                    {{ item.Activity_Name }}
                </option>
            </select>
        </div>

        <div class="col-md-6">
            <label class="form-label">หมวดงบ</label>
            <select (ngModelChange)="onBudgetChange($event)" class="form-select" [(ngModel)]="model.selectedBudget">
                <option [ngValue]="null" disabled selected>-- เลือกหมวดงบ --</option>
                <option *ngFor="let item of Mas_Budget_Types" [ngValue]="item">
                    {{ item.Budget_Type_Name }}
                </option>
            </select>

        </div>

        <div class="col-md-12">
            <label class="form-label">ชื่อโครงการ</label>
            <input [(ngModel)]="model.Project_Name" type="text" class="form-control">
        </div>
    </div>
</div>

<!-- ลักษณะโครงการ -->



<!-- การดำเนินการ -->

<div class="row mt-4">

    <!-- ลักษณะโครงการ -->
    <div class="col-md-2">
        <label class="form-label d-block">ลักษณะโครงการ</label>

        <div class="form-check form-check-inline">
            <input type="radio" class="form-check-input" id="natureBudget" name="projectNatureType" value="budget">
            <label class="form-check-label" for="natureBudget">
                ใช้งบ
            </label>
        </div>

        <div class="form-check form-check-inline">
            <input type="radio" class="form-check-input" id="natureNonBudget" name="projectNatureType"
                value="nonbudget">
            <label class="form-check-label" for="natureNonBudget">
                ไม่ใช้งบ
            </label>
        </div>
    </div>
    <div class="col-md-2">
        <label class="form-label d-block">การดำเนินการ</label>

        <div class="form-check form-check-inline">
            <input type="checkbox" class="form-check-input" id="operateSelf" value="self">
            <label class="form-check-label" for="operateSelf">
                ดำเนินการเอง
            </label>
        </div>

        <div class="form-check form-check-inline">
            <input type="checkbox" class="form-check-input" id="operateHire" value="hire">
            <label class="form-check-label" for="operateHire">
                จัดจ้าง
            </label>
        </div>
    </div>

</div>
<div class="row mt-2">
    <div class="col-md-2">
        <label class="form-label d-block">ประเภทโครงการ</label>

        <div class="form-check">
            <input type="radio" class="form-check-input" id="natureNew" name="projectNature" value="new"
                [(ngModel)]="projectNature">

            <label class="form-check-label" for="natureNew">
                โครงการใหม่
            </label>
        </div>

        <div class="form-check">
            <input type="radio" class="form-check-input" id="natureContinue" name="projectNature" value="continue"
                [(ngModel)]="projectNature">

            <label class="form-check-label" for="natureContinue">
                โครงการต่อเนื่อง
            </label>
        </div>
    </div>

    <div class="col-md-3" *ngIf="projectNature === 'continue'">
        <label class="form-label">จำนวนปีที่ดำเนินการ</label>
        <input type="number" class="form-control" placeholder="กรอกจำนวนปี" [(ngModel)]="totalYears">
    </div>

    <div class="col-md-3" *ngIf="projectNature === 'continue'">
        <label class="form-label">ปีนี้เป็นปีที่</label>
        <input type="number" class="form-control" placeholder="กรอกปี" [(ngModel)]="currentYear">
    </div>

</div>




<!-- Continue Project Only -->
@if (project_planing === 'continue' ) {<div class="row mt-3">

    <div class="col-md-6">
        <label class="form-label">จำนวนปีที่ดำเนินการ</label>
        <input type="number" class="form-control">
    </div>

    <div class="col-md-6">
        <label class="form-label">ปีนี้เป็นปีที่</label>
        <input type="number" class="form-control">
    </div>

</div>
}
